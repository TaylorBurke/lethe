# The Frida Oracle
# 36 cards drawn from Frida Kahlo's paintings, diary,
# recurring symbols, and personal mythology.
# Maximum 100 cards per deck.

deck_name: "The Frida Oracle"

cards:
  # ── Body & Pain (1-7) ──

  - name: "The Broken Column"
    description: "A woman's bare torso split open vertically revealing a crumbling Ionic column inside, white surgical corset with leather straps holding her together, iron nails studding the skin, a cracked barren landscape stretching behind her under a pale grey sky"
    keywords: [broken column, split torso, nails, surgical corset, cracked earth]
    meaning: "The wound is open and it is yours. You are not falling apart — you are showing what has always held you upright. Name the fracture and it becomes architecture."
    composition: "frontal torso filling center frame, column visible through split, barren plain behind, low horizon"

  - name: "Henry Ford Hospital"
    description: "A small brown-skinned figure lying on a white hospital bed floating above flat red earth, six red ribbons trailing from the body outward to floating objects — a snail, a flower, an orchid, a pelvis bone — the Detroit industrial skyline faint on the horizon"
    keywords: [hospital bed, red ribbons, floating symbols, red earth, industrial skyline]
    meaning: "Loss does not leave cleanly. It trails behind you, tethered by red threads you cannot cut. Let the grief float where it needs to — it knows its shape better than you do."
    composition: "figure on bed at center, ribbons radiating outward to floating objects, flat red ground, distant skyline"

  - name: "The Corset"
    description: "A cracked white plaster body cast standing upright against a terracotta wall, its surface painted with bright flowers and a red hammer-and-sickle, cracks running through the painted blooms, warm afternoon light casting long shadows"
    keywords: [plaster cast, painted flowers, cracks, terracotta wall, hammer and sickle]
    meaning: "You have decorated your cage so beautifully that you almost forgot it was a cage. The cracks are not damage — they are the places where you are outgrowing what was meant to hold you still."
    composition: "body cast centered against warm wall, painted details visible, cracks prominent, strong side lighting"

  - name: "The Surgical Table"
    description: "Steel surgical instruments arranged on a white embroidered cloth like a ritual offering, scalpels and clamps laid in careful rows, bright orange marigolds growing up between the tools, warm candlelight from below"
    keywords: [surgical instruments, embroidered cloth, marigolds, candlelight]
    meaning: "Healing and cutting are the same gesture. What needs to be opened in you is not a problem — it is a ceremony. Prepare the table. Steady your hands."
    composition: "overhead view of instruments on cloth, marigolds sprouting between, warm light from edges"

  - name: "The Spine of Thorns"
    description: "A human spine made of braided green nopal cactus pads rising vertically from cracked red earth, each vertebra blooming with magenta prickly pear flowers, pale roots descending into the soil, deep turquoise sky behind"
    keywords: [cactus spine, nopal, magenta flowers, red earth, roots]
    meaning: "Your strength was grown in hostile soil. Every thorn is a boundary you learned the hard way. Stand tall in what made you — the bloom and the blade are the same plant."
    composition: "vertical cactus spine centered, flowers along length, roots below, earth and sky divided"

  - name: "Without Hope"
    description: "A figure propped in a wooden bed on a volcanic plain, an enormous funnel descending from above pouring grotesque abundance into the open mouth — sugar skulls, raw meat, a fish skeleton, bright candy — tears streaming down the cheeks, grey volcanic landscape stretching to smoking peaks"
    keywords: [funnel, grotesque feast, bed, volcanic landscape, tears]
    meaning: "You are being fed what you did not ask for. The world pushes abundance at your open wound and calls it nourishment. Spit it out. Your hunger is for something they are not offering."
    composition: "figure in bed at lower center, funnel pouring from above, volcanic plain behind, grey sky"

  - name: "Tree of Hope"
    description: "A scene split vertically — on the left, a prone surgical body on a metal gurney under harsh yellow daylight, blood visible on bandages — on the right, a defiant standing figure in a red Tehuana dress holding a pink back brace aloft like a flag under a dark starry sky, crescent moon above"
    keywords: [split scene, gurney, Tehuana dress, day and night, back brace]
    meaning: "You are both of these. The one on the table and the one who stands. Do not choose — hold them together. The night self carries what the day self cannot."
    composition: "vertical split composition, daylit surgical scene on left, moonlit standing figure on right, shared horizon line"

  # ── Love & Duality (8-14) ──

  - name: "The Two Fridas"
    description: "Two women seated side by side on a green bench against a stormy grey sky, one in a white European lace dress with an exposed bleeding heart, one in a deep green Tehuana dress with a whole heart, a thin red vein connecting their two hearts, surgical clamp on one end dripping blood onto the white skirt"
    keywords: [two women, connected hearts, stormy sky, white dress, green dress]
    meaning: "You contain two selves who do not agree. One bleeds where the other is whole. Stop choosing between them — the vein that connects them is the truest thing about you."
    composition: "two seated figures side by side at center, stormy sky behind, vein visible between exposed hearts"

  - name: "Diego and I"
    description: "A close portrait of a woman's face with tears on both cheeks, a small male figure embedded in the center of the forehead like a third eye, long dark hair unraveling and wrapping around the throat in loose coils, deep green foliage pressing in from the edges"
    keywords: [portrait, forehead figure, hair coiling, tears, green foliage]
    meaning: "You have let someone live inside your head so long they have taken root there. The hair tightens. Love that constricts your breathing is not love — it is occupation."
    composition: "tight facial portrait filling frame, small figure visible on forehead, hair wrapping downward, dark leaves framing"

  - name: "The Love Embrace"
    description: "Three layered figures embracing — a massive brown earth-mother with cracked clay skin cradling a woman in a red dress who in turn holds a small naked man like an infant, thick roots and cacti framing them on both sides, a blazing gold sun on one side and a silver crescent moon on the other"
    keywords: [layered embrace, earth mother, roots, sun and moon, nested figures]
    meaning: "You hold what holds you. The earth mothers the woman, the woman mothers the man, and the man does not know he is the smallest thing. Tend to what you carry, but remember who carries you."
    composition: "centered nested figures, largest at back smallest in front, roots framing sides, sun left moon right"

  - name: "The Bleeding Heart"
    description: "An anatomical human heart resting on a rough stone altar, pierced by three small silver milagro charms in the shape of a leg, a hand, and an eye, deep red blood pooling beneath and running in rivulets down the stone, scattered marigold petals floating in the pooled blood"
    keywords: [anatomical heart, stone altar, milagro charms, blood pool, marigold petals]
    meaning: "You keep offering your heart on altars that do not deserve it. The milagros you pin to it are prayers for parts of yourself you have given away. Call them back."
    composition: "heart centered on stone surface, silver charms catching light, blood pooling beneath, petals floating"

  - name: "The Ribbon"
    description: "A single red satin ribbon unspooling from a wound in a woman's bare chest, stretching across a vast golden landscape dotted with agave plants, reaching toward a distant second figure standing at the far horizon, the ribbon taut and vibrating"
    keywords: [red ribbon, wound, golden landscape, distant figure, agave]
    meaning: "The cord between you has never been cut. Across any distance, the pull remains. You must decide if you are following the ribbon or being dragged by it."
    composition: "figure at left edge, ribbon stretching diagonally across landscape to small distant figure at right, agave dotting terrain"

  - name: "The Empty Bed"
    description: "A narrow iron-frame bed with rumpled white linen sheets in a room with vivid cobalt blue walls, a single wilted sunflower lying on the pillow, a man's dark hat resting on a wooden chair beside the bed, late afternoon light falling through a high window"
    keywords: [iron bed, white sheets, blue room, wilted sunflower, hat on chair]
    meaning: "The absence has a shape. It sleeps where they slept, it wilts on the pillow. You cannot fill this bed with anything but time. Let the blue room hold you while you learn to sleep alone."
    composition: "bed at center in blue room, sunflower on pillow, chair with hat beside, window light angled across"

  - name: "A Few Small Nips"
    description: "A woman standing calmly in a white slip marked with small red cuts across arms and shoulders, five white doves circling her head in a halo pattern, each dove trailing a thin red ribbon from its beak, blood-red bougainvillea climbing the wall behind her"
    keywords: [white slip, small cuts, circling doves, red ribbons, bougainvillea]
    meaning: "They called it a few small nips. They always minimize the wound. But you are still standing and the doves still circle and the blood is proof that you survived what was done to you."
    composition: "standing figure centered, doves circling above, ribbons trailing, bougainvillea on wall behind"

  # ── Nature & Roots (15-21) ──

  - name: "Roots"
    description: "A woman reclining on her side on dry cracked brown earth, her torso opened like a window revealing green vines and tendrils that pour out and penetrate the cracks in the ground, spreading outward in a vascular network, leaves unfurling from the vine tips, warm ochre light"
    keywords: [reclining figure, open torso, green vines, cracked earth, spreading roots]
    meaning: "You are not lying down — you are planting yourself. The body becomes earth, the veins become roots, the blood becomes water. Rest is not retreat. Rest is how you take hold of the ground beneath you."
    composition: "figure reclining at center, vines spreading from torso into cracked earth, warm earth tones, horizontal format"

  - name: "The Monkey"
    description: "A dark-eyed spider monkey sitting on a woman's shoulder, one long arm draped across her collarbone, dense jungle foliage pressing close on all sides — broad banana leaves, hanging orchids, tangled vines — the monkey gazing directly outward with ancient knowing eyes"
    keywords: [spider monkey, shoulder, jungle foliage, orchids, dark eyes]
    meaning: "The creature on your shoulder knows what you refuse to say aloud. Your animal self is wiser than your speaking self. Let it grip you closer. Let it watch."
    composition: "monkey and shoulder filling center, dense botanical framing on all sides, direct eye contact from monkey"

  - name: "The Wounded Deer"
    description: "A young deer with a woman's solemn face and tall branching antlers, pierced by nine wooden arrows in its flank, mid-stride running through a dense forest of thin grey trees, a pale strip of sea visible between the far trunks, blood drops on fallen leaves"
    keywords: [deer, human face, arrows, forest, distant sea]
    meaning: "You keep running through the forest with the arrows still in you. The sea is visible between the trees — you are closer to open water than you think. Do not stop. Do not pull them out yet. Just reach the shore."
    composition: "deer in mid-stride at center, vertical tree trunks framing, strip of sea visible through gaps, arrows protruding"

  - name: "The Parrot"
    description: "A vivid green parrot perched on a brown hand extended from a window framed with cascading magenta bougainvillea, bright golden afternoon light catching the iridescent wing feathers, cobalt blue wall surrounding the window, terracotta pot on the sill"
    keywords: [green parrot, outstretched hand, bougainvillea, blue wall, golden light]
    meaning: "Speak in color. The words they taught you are too small for what you need to say. Open your throat and let the wild green language out — the one that knows no grammar, only song."
    composition: "window frame at center, hand extending outward with parrot, bougainvillea cascading, blue wall"

  - name: "The Watermelons"
    description: "Three split watermelons on a deep blue painted table, their flesh vivid red and glistening, black seeds scattered across the surface like a star map, thick green rinds curving, one whole watermelon behind them, a small Mexican flag planted in the nearest half"
    keywords: [split watermelons, blue table, scattered seeds, red flesh, green rind]
    meaning: "Crack yourself open. The sweetest part of you is the most exposed, the most vulnerable to spoiling. Eat it now. Savor it now. This ripeness will not wait for you to be ready."
    composition: "watermelons arranged on blue table surface, seeds scattered, overhead angle, saturated colors"

  - name: "The Garden of Casa Azul"
    description: "A lush interior courtyard with vivid cobalt blue walls, overflowing with tropical plants in terracotta pots — broad-leafed philodendrons, tall cacti, trailing ferns — a stone fountain at center surrounded by pre-Columbian stone sculptures nestled among the greenery, dappled sunlight through overhead vines"
    keywords: [blue courtyard, tropical plants, terracotta pots, stone fountain, pre-Columbian sculptures]
    meaning: "Build your world in blue. Fill it with living things and ancient things and let them grow together. The garden does not separate the sacred from the daily — the sculpture drinks from the same rain as the fern."
    composition: "courtyard interior, blue walls visible, fountain centered, plants and sculptures filling space, dappled light"

  - name: "The Xoloitzcuintli"
    description: "A sleek hairless black dog sitting alert on warm terracotta floor tiles, surrounded by a ring of bright orange marigolds, shadows of papel picado banners falling across its dark skin in lace-like patterns, golden late-day light, the dog's ears pricked forward"
    keywords: [hairless dog, terracotta tiles, marigolds, papel picado shadows, alert pose]
    meaning: "The ancient companion waits. This one has walked beside the dead and returned. It guards the threshold between your waking life and the underworld of memory. Follow where it sits — that is the door."
    composition: "dog centered on tile floor, marigold ring around it, papel picado shadow patterns on ground, warm light"

  # ── Identity & Defiance (22-29) ──

  - name: "Self-Portrait with Thorn Necklace"
    description: "A frontal portrait of a woman wearing a necklace of twisted green thorns that pierce the skin of her neck, drawing thin lines of blood, a dead black hummingbird hanging as pendant at the throat, a black cat crouching on one shoulder and a spider monkey on the other, large morpho butterflies resting in the dark hair, dense green leaves behind"
    keywords: [thorn necklace, dead hummingbird, black cat, monkey, butterflies in hair]
    meaning: "You wear your suffering like jewelry. The thorns are deliberate — you chose them. But look: even the dead bird at your throat was once iridescent. Even the wound decorates you. This is not vanity. This is war paint."
    composition: "tight frontal portrait, thorn necklace at center of throat, cat on one shoulder monkey on other, butterflies in hair, leaf background"

  - name: "Self-Portrait with Cropped Hair"
    description: "A figure in an oversized dark man's suit sitting on a yellow wooden chair in an empty room, shorn black hair scattered across the floor in long coils and clumps, a pair of open scissors held loosely in one hand, a single braid still attached hanging over one ear"
    keywords: [oversized suit, yellow chair, shorn hair on floor, scissors, empty room]
    meaning: "You cut it all off and it felt like nothing and it felt like everything. The suit does not fit. The chair is too bright. But your head is light and the floor is covered in who you used to be. Walk out."
    composition: "seated figure at center, hair scattered across floor, scissors in hand, yellow chair against bare wall"

  - name: "The Tehuana Dress"
    description: "An elaborate white Tehuana lace headdress and richly embroidered dark velvet huipil displayed on a wooden dress stand, cascading embroidered flowers in magenta and gold down the front, a tall oval mirror behind the stand reflecting only the empty room, no figure in the glass"
    keywords: [Tehuana headdress, embroidered huipil, dress stand, empty mirror, flowers]
    meaning: "The costume is ready but you have not yet stepped into it. The mirror shows the room without you in it. What version of yourself are you dressing for? Put it on. Become the portrait."
    composition: "dress stand centered, headdress at top, embroidery visible, mirror behind showing empty reflection"

  - name: "The Unibrow"
    description: "An extreme close-up of two dark unflinching eyes beneath a single thick black eyebrow that connects across the bridge of the nose like a bird in flight, tiny wildflowers and morning glories growing from the brow ridge, deep brown skin, unwavering direct gaze"
    keywords: [connected eyebrow, close-up eyes, wildflowers, direct gaze, bird shape]
    meaning: "They asked you to pluck it, to split yourself into two acceptable halves. You refused. The bridge between your eyes is the bridge between your selves. It blooms. Let them stare."
    composition: "extreme close-up of eyes and brow filling frame, flowers growing from brow, sharp focus on gaze"

  - name: "The Diary"
    description: "An open handmade journal lying on a wooden table, its pages covered in loose watercolor washes of green and magenta, half-formed painted figures overlapping with blurred handwritten words, dried pressed flowers and a faded photograph tucked between pages, ink stains on the table"
    keywords: [open journal, watercolor pages, blurred writing, pressed flowers, ink stains]
    meaning: "Write it down before it heals over. The diary does not need to be beautiful — it needs to be true. Paint over the words if the words are not enough. The mess on the page is the mess in you, and that is the art."
    composition: "open journal at center on table, pages spread showing painted content, pressed flowers visible, overhead angle"

  - name: "The Palette"
    description: "A wooden kidney-shaped painter's palette hovering above a cluttered table, the mixed paint colors on its surface forming the ghostly image of a woman's face, scattered brushes below arranged like a skeleton's ribs, tubes of oil paint squeezed flat"
    keywords: [painter's palette, floating, paint-face, scattered brushes, oil paint tubes]
    meaning: "You are both the painter and the paint. Every color you mix is blood from a different vein. The portrait on the palette is not your subject — it is your confession."
    composition: "palette floating at center-upper frame, face emerging from paint surface, brushes and tubes on table below"

  - name: "The Communist Heart"
    description: "A raised clenched brown fist emerging from a dense field of bright red poppies, a white dove perched calmly on the wrist, a silver hammer gripped in the fist, purple mountains in the far distance under dramatic clouds, golden light on the flowers"
    keywords: [clenched fist, red poppies, white dove, hammer, mountains]
    meaning: "Your tenderness and your rage share the same hand. The dove lands on the fist that holds the hammer. You do not have to choose between gentleness and revolution — the field blooms in both."
    composition: "fist rising from center of flower field, dove on wrist, mountains on horizon, dramatic sky above"

  - name: "The Ancestor"
    description: "A small pre-Columbian stone figure standing in a blue-painted wall niche, surrounded by modern objects placed as offerings — a tube of red lipstick, a black camera, a curved surgical needle with thread, a shot glass of mezcal — warm candlelight flickering across the ancient face"
    keywords: [stone figure, blue niche, modern offerings, lipstick, candlelight]
    meaning: "The ancient one in the wall has been watching you longer than you know. You come from a line that survived obsidian and steel. Place your modern tools beside theirs. You are the same hand across centuries."
    composition: "niche centered in blue wall, stone figure at center, modern objects arranged around it, warm candle glow"

  # ── Death & Rebirth (30-36) ──

  - name: "The Bus"
    description: "A row of passengers sitting on a worn wooden bench inside a cramped yellow bus — a worker in overalls holding a wrench, a mother clutching a bundled infant, a businessman gripping a leather case — each face calm, golden light through dusty windows, the frozen moment before everything changes"
    keywords: [bus interior, wooden bench, passengers, golden light, frozen moment]
    meaning: "This is the moment before. You are sitting on the bench holding something precious and you do not know yet what is coming. Breathe. Hold tighter. The impact will remake you but it has not arrived."
    composition: "row of seated figures on bench inside bus, dusty golden window light, close interior framing"

  - name: "The Skeleton"
    description: "A life-size papier-mache skeleton bride wearing a full Tehuana dress and lace headdress, dancing alone on a rooftop terrace at violet dusk, bright papel picado streamers and orange marigold garlands strung behind her, one bony hand raised holding a lit sparkler"
    keywords: [skeleton bride, Tehuana dress, rooftop, papel picado, marigold garlands]
    meaning: "She is not mocking you — she is inviting you. Death wears your best dress and dances the dance you are too afraid to start. Join her on the roof. The music is already playing."
    composition: "skeleton figure dancing at center of rooftop, papel picado and garlands behind, violet dusk sky, sparkler trail"

  - name: "The Miscarriage"
    description: "A small stone cradle sitting on a tiled floor filled with dark rich earth instead of a child, a single green shoot pushing up through the soil toward a beam of pale moonlight falling through a high window, terracotta walls, profound stillness"
    keywords: [stone cradle, earth, green shoot, moonlight, terracotta walls]
    meaning: "What did not live still grew something. The cradle is not empty — it is planted. You did not fail to bring life. You became the soil. Watch what pushes through."
    composition: "cradle at lower center, green shoot reaching upward toward moonlight beam from window, warm walls, still atmosphere"

  - name: "What the Water Gave Me"
    description: "A bathtub viewed from above with a pair of brown feet at the far end breaking the water surface, the bathwater filled with floating miniature scenes — a tiny erupting volcano, a small skeleton in a dress, tropical flowers, crumbling buildings, a coiled snake — all drifting between the submerged legs"
    keywords: [bathtub, feet, floating miniatures, volcano, skeleton, flowers]
    meaning: "Lie still and see what surfaces. The water holds everything you have tried to submerge — your cities, your dead, your eruptions. Do not drain the tub. Float with them. They are yours."
    composition: "overhead view of bathtub, feet at far end, miniature scenes floating in water between legs, tiled floor visible at edges"

  - name: "The Sun and Moon"
    description: "A woman's face split vertically down the center — the left half illuminated by a blazing gold sun over arid desert with cacti, the right half bathed in cool silver moonlight over dense dark jungle — a single closed third eye at the center of the forehead on the dividing line, deep magenta lips spanning both halves"
    keywords: [split face, sun and desert, moon and jungle, third eye, divided]
    meaning: "You are the border between your own day and night. The desert self bakes and endures. The jungle self grows wild in darkness. The eye at the center has not opened yet — when it does, you will see both worlds as one."
    composition: "face filling frame split vertically, desert and sun on left, jungle and moon on right, third eye at division point"

  - name: "The Offering"
    description: "A Dia de los Muertos ofrenda table laden with towers of bright orange marigolds, painted sugar skulls with glittering eyes, tall lit beeswax candles dripping, loaves of pan de muerto dusted with sugar, a framed painted photograph propped at the back, a full shot glass of amber tequila at the front"
    keywords: [ofrenda table, marigolds, sugar skulls, candles, pan de muerto]
    meaning: "Set the table for who is gone. Light the candle, pour the drink, stack the flowers until the scent pulls them back across the threshold. The dead are not far. They are just waiting to be fed."
    composition: "table laden with offerings filling frame, marigold towers, candles lit, photograph at back, warm golden glow"

  - name: "The Wings"
    description: "A woman mid-stride walking forward as a white plaster body cast cracks and falls away from her body in large fragments, the skin underneath covered in brilliant orange and black monarch butterfly wing patterns, the cast pieces behind her transforming into small birds taking flight, golden light ahead"
    keywords: [breaking cast, monarch wings, walking figure, birds, golden light]
    meaning: "Walk out of it. The cast is cracking because you are moving and you were never meant to stay still. The wings were always underneath — every broken piece becomes something that flies. You were the chrysalis all along."
    composition: "figure striding forward at center, cast fragments falling behind becoming birds, butterfly-wing skin revealed, golden light ahead"
