major_arcana:
  - name: "The Fool"
    numeral: "0"
    description: "A young figure in rough wool steps from a mountain village onto a descending path, hazel staff in hand, sea spreading below in pale ink wash. A hawk circles in empty sky above. Sumi-e brushstrokes dissolve the village into mist behind; the figure is a single dark stroke against vast white space."
    key_symbols: [young traveler, hazel staff, mountain village, sea below, circling hawk]
    composition: "Figure at upper left descending rightward; the mountain village fades into white behind; the sea fills the lower half as grey wash; hawk a small dark mark in open sky"

  - name: "The Magician"
    numeral: "I"
    description: "A still figure stands at a rough stone table bearing four elements — a guttering candle, a bronze water bowl, a grey feather, a river stone — runes carved into the table's edge. Ink pools in the rune grooves. The figure's hands hover above the objects, not touching."
    key_symbols: [stone table, candle flame, water bowl, grey feather, river stone, carved runes]
    composition: "Central figure behind the table; four objects in a row before them; runes visible along the table edge; white space above and below"

  - name: "The High Priestess"
    numeral: "II"
    description: "A robed figure sits deep in an underground labyrinth, a single candle flame the only light. Carved walls press close, their patterns half-visible in shadow. The flame is the brightest mark on the page — everything else recedes into layered grey wash and darkness."
    key_symbols: [robed figure, underground labyrinth, single candle, carved walls, darkness]
    composition: "The candle flame at center draws the eye; the figure sits below it; carved walls close in from both sides; deep black ink at the edges fading to nothing"

  - name: "The Empress"
    numeral: "III"
    description: "A woman sits in a grove of ancient trees, branches heavy with dark fruit, an otak curled sleeping in her lap. Wet-on-wet ink bleeds through the canopy above. Her hands rest open. The trees are bold vertical strokes; the fruit small dark circles; the otak a quick warm brushstroke of burnt amber."
    key_symbols: [seated woman, ancient grove, dark fruit, sleeping otak, open hands]
    composition: "Woman centered beneath the canopy; tree trunks frame her as vertical columns; the otak in her lap is the warm focal point against cool greys"

  - name: "The Emperor"
    numeral: "IV"
    description: "A figure sits on a stone throne at the edge of a sea cliff, carved staff upright beside them, islands scattered on the horizon in pale wash. Wind pulls at a cloak rendered in a single sweeping brushstroke. The throne is angular, heavy — the sea beyond is all empty space and mist."
    key_symbols: [stone throne, sea cliff, carved staff, distant islands, wind-blown cloak]
    composition: "Figure and throne anchored at left; the cliff drops away at center; islands are faint grey marks on the right horizon; vast sky above"

  - name: "The Hierophant"
    numeral: "V"
    description: "An old master stands in the courtyard of a tower school, two students kneeling before him on worn stone. The tower rises behind in strong vertical strokes. The master's hands are raised mid-gesture, teaching. Ink wash suggests courtyard walls fading into white; the students are small dark forms."
    key_symbols: [old master, tower school, kneeling students, courtyard stones, teaching gesture]
    composition: "Master standing at center with tower rising behind; two students symmetrically placed below; courtyard recedes into white space at edges"

  - name: "The Lovers"
    numeral: "VI"
    description: "Two figures stand on opposite shores of a narrow strait, arms reaching across the water. A small boat floats between them, unmanned. The water is a single broad stroke of grey wash; each figure a dark ink mark on pale rock. The space between them is the composition's heart."
    key_symbols: [two reaching figures, narrow strait, small boat, opposite shores, open water]
    composition: "Left figure and right figure mirror each other at the edges; the boat sits at center in the grey water; the strait runs vertically through the middle"

  - name: "The Chariot"
    numeral: "VII"
    description: "A single figure grips the tiller of a small sailing boat in rough open sea, waves rendered as bold curved strokes. Stars burn through rags of storm cloud above. The boat tilts at a steep angle — the figure leans against the wind. Spray dissolves into white at the edges."
    key_symbols: [sailing boat, lone figure at tiller, rough sea, storm clouds, stars through gaps]
    composition: "Boat angled from lower left to upper right, cutting through waves; stars visible in upper left through torn clouds; spray and white space at margins"

  - name: "Strength"
    numeral: "VIII"
    description: "A figure stands with open empty hands before a dragon, eye to eye. No weapon. The dragon is rendered in flowing ink — sinuous neck, ancient face, wings folded. The human is a small still form. Between them: white space, charged with silence."
    key_symbols: [open hands, dragon face, eye contact, no weapon, stillness between]
    composition: "Dragon fills the upper right in sweeping ink; human figure stands small at lower left; the diagonal space between their eyes is the focal axis"

  - name: "The Hermit"
    numeral: "IX"
    description: "A solitary figure on a fog-wrapped mountain, one hand resting on the bark of a weathered tree, herbs tied at the belt. Fog is wet-on-wet wash bleeding across the page. The tree and figure are the only defined forms — everything else dissolves into grey and white."
    key_symbols: [solitary figure, fog-wrapped mountain, weathered tree, hand on bark, herbs at belt]
    composition: "Figure and tree at center, emerging from fog; the mountain is suggested by grey gradients; white space dominates — emptiness as presence"

  - name: "Wheel of Fortune"
    numeral: "X"
    description: "A great stone circle stands on a windswept hilltop, shadows turning across the ground as if the sun moves while you watch. Sea visible in every direction as pale wash. The stones are heavy black strokes; the shadows long grey angles; the sky enormous and empty."
    key_symbols: [stone circle, hilltop, turning shadows, sea in all directions, wind]
    composition: "Stone circle at center; shadows radiate outward from it; sea encircles the hilltop at all edges; sky fills the upper two-thirds"

  - name: "Justice"
    numeral: "XI"
    description: "A figure holds balanced scales on a rocky shore — a feather in one pan, a stone in the other. The sea behind is utterly calm, a single flat wash of grey. The figure's feet are bare on wet rock. Everything is still. The scales hang perfectly level."
    key_symbols: [balanced scales, feather and stone, rocky shore, calm sea, bare feet]
    composition: "Central standing figure with scales extended; the calm sea a horizontal band behind; rocky shore rendered in minimal dark strokes below"

  - name: "The Hanged Man"
    numeral: "XII"
    description: "A figure hangs suspended by one ankle from the mast of a beached boat, the tide coming in around the hull. The face is serene, eyes open. The boat lists on wet sand; water creeps closer in thin ink lines. The rope and mast form a stark vertical against horizontal sea."
    key_symbols: [suspended figure, beached boat mast, incoming tide, serene face, rope]
    composition: "Mast and hanging figure form a strong vertical at center; the boat's hull curves below; tide lines advance from the right; horizon low and distant"

  - name: "Death"
    numeral: "XIII"
    description: "A lone figure walks across the dry land under a starless sky, dust rising with each step. A low stone wall is visible far behind, barely a mark on the page. The ground is cracked and pale; the sky is black ink pressed flat. The figure walks away from the viewer into nothing."
    key_symbols: [walking figure, dry land, starless sky, rising dust, distant stone wall]
    composition: "Figure small at center walking into the distance; the stone wall a faint line behind; black sky presses down from above; dust rises as light grey marks around the feet"

  - name: "Temperance"
    numeral: "XIV"
    description: "A figure kneels where a freshwater stream meets the sea, pouring water between two bronze vessels. Mist rises at the meeting of waters. The stream enters from the left in quick brushstrokes; the sea spreads right as flat wash. The pouring arc between vessels is a single clean line."
    key_symbols: [kneeling figure, two bronze vessels, freshwater meeting sea, mist, pouring arc]
    composition: "Figure kneels at the convergence point at center; stream flows in from left; sea opens to the right; mist rises vertically above the meeting of waters"

  - name: "The Devil"
    numeral: "XV"
    description: "A figure stares into a dark mirror — polished obsidian on a stone stand — and their shadow-double stares back with a different expression. Loose chains hang at the figure's wrists, not locked. The mirror is the darkest point on the page, pure black ink. Everything else fades to grey."
    key_symbols: [dark mirror, shadow double, loose chains, obsidian surface, different expression]
    composition: "Figure at left facing the mirror at center; the reflection visible within the black surface; chains hang slack below the wrists; white space surrounds the scene"

  - name: "The Tower"
    numeral: "XVI"
    description: "A wizard's tower on a rocky island splits under dragonfire from above, stones falling into the sea. The dragon is a sweeping ink stroke across the top of the page; the fire a burst of burnt amber. Stones tumble as scattered dark marks. The sea receives them in grey silence."
    key_symbols: [wizard tower, rocky island, dragonfire, falling stones, sea below]
    composition: "Tower at center, cracking; dragon sweeps across the top; stones scatter downward and outward; the sea surrounds the island at the bottom third"

  - name: "The Star"
    numeral: "XVII"
    description: "A figure kneels at a tide pool at night, pouring water from a vessel into the sea. Constellations are reflected in the pool's surface — the sky below as clear as the sky above. The water poured is a thin line of deep blue. Everything else is black ink and bone white."
    key_symbols: [kneeling figure, tide pool, poured water, reflected constellations, night sky]
    composition: "Figure kneels at lower left; the tide pool spreads at center reflecting stars; the sky above mirrors the pool below; the pouring water connects them"

  - name: "The Moon"
    numeral: "XVIII"
    description: "A small boat drifts on perfectly still sea under a full moon, its reflection creating a second moon below the waterline. A different sky shows beneath the water — wrong stars, wrong depths. Two sentinel islands rise dark at the edges. Silence made visible."
    key_symbols: [drifting boat, full moon, reflection, different sky beneath, two sentinel islands]
    composition: "Moon at top center, boat at the midline, reflected moon below; the water divides the page into two mirror worlds; sentinel islands frame left and right edges"

  - name: "The Sun"
    numeral: "XIX"
    description: "Children play on a sunlit beach beside a beached boat, a dolphin leaping in the shallows. Morning light washes everything in warmth — the only card where light fills the page. Quick joyful brushstrokes. The dolphin is a single curved ink mark. Sand and sea are warm grey wash."
    key_symbols: [playing children, sunlit beach, beached boat, leaping dolphin, morning light]
    composition: "Children scattered across the lower half on the beach; the dolphin arcs at center right; the boat rests at left; light radiates from upper right, filling the page"

  - name: "Judgement"
    numeral: "XX"
    description: "Figures emerge from underground tombs into daylight, hands raised to shield their eyes. The tomb mouths are dark rectangles of pure black ink; the daylight above is raw white paper. The figures stand at the threshold between dark and light, half in shadow, half revealed."
    key_symbols: [emerging figures, underground tombs, daylight, shielding hands, threshold]
    composition: "Dark tomb openings at bottom; figures climbing upward into white space above; the contrast between black below and white above is the composition's force"

  - name: "The World"
    numeral: "XXI"
    description: "A dragon and a human face each other in perfect stillness on a cliff above the sea, wind moving through the grass between them. Neither speaks. The dragon is rendered in full flowing ink — the most complete brushwork in the deck. The sea stretches to the edge of the world below."
    key_symbols: [dragon, human figure, cliff edge, wind in grass, sea to horizon, stillness]
    composition: "Dragon at right, human at left, both in profile facing center; the cliff edge below; sea and sky merge at the horizon in pale wash; grass bends between them"

minor_arcana:
  flames:
    pips:
      "1":
        description: "A single flame burns on a stone altar at a cliff's edge, wind streaking across the page but unable to touch it. The flame is burnt amber against black ink altar and pale sky. Below, the sea. The flame is still while everything around it moves."
        key_symbols: [single flame, stone altar, cliff edge, wind streaks, untouched fire]
        composition: "Altar and flame at center on the cliff; wind rendered as horizontal brush strokes passing around the flame; sea below as grey wash"
      "2":
        description: "A figure holds two torches at a coastal crossroads where paths split toward two islands visible on the horizon. The torches cast pools of burnt amber light on the ground. The figure pauses mid-step, choosing. Ink wash fades the islands into mist."
        key_symbols: [two torches, coastal crossroads, two islands, choosing figure, torch light]
        composition: "Figure at center where paths diverge; one torch in each hand casting light downward; the two islands faint marks on the horizon at left and right"
      "3":
        description: "Three signal fires burn on hilltops across an island chain, each answered by the next. Ships move between the islands as small dark marks. The fires are dots of burnt amber connected by implied lines across grey water. Smoke rises and merges with cloud."
        key_symbols: [three signal fires, island chain, ships between, smoke rising, answered flames]
        composition: "Three hilltops arranged diagonally across the page, each crowned with fire; ships in the channels between; smoke trails upward into open sky"
      "4":
        description: "Four torches mark the corners of a village celebration, dancers moving within the ring of light. The figures are loose quick strokes — all motion, no detail. The torches burn steady as amber points. Beyond the light, dark ink and the suggestion of low houses."
        key_symbols: [four torches, village celebration, dancers, ring of light, dark houses beyond]
        composition: "Four torch points form a square; dancers fill the space between as fluid brushstrokes; darkness at the edges; celebration contained within the light"
      "5":
        description: "Five figures with staffs clash in a dusty courtyard, a tower school rising behind. Dust is dry-brush texture; the staffs cross at sharp angles. The tower watches over the scene, indifferent and vertical. Quick aggressive strokes — this card has no stillness in it."
        key_symbols: [five clashing staffs, dusty courtyard, tower school, sparring figures, rising dust]
        composition: "Figures crowded at center in dynamic angles; the tower rises behind at upper center; dust clouds spread outward from the conflict; confined frame"
      "6":
        description: "A figure stands in a boat holding a torch aloft, leading a procession of boats through a narrow channel between islands. The lead torch is bright amber; the following lights recede into grey. Water reflects the flames as broken vertical lines."
        key_symbols: [torchbearer in boat, procession of boats, narrow channel, reflected firelight, following lights]
        composition: "Lead boat at center with torch raised; trailing boats diminish into the background; channel walls dark at the edges; reflections streak downward in the water"
      "7":
        description: "A lone figure stands on a rocky outcrop, flaming staff held high, six shadow-forms climbing the slope below. The figure is silhouetted against pale sky; the shadows below are rendered in layers of grey wash, each darker than the last. The staff's flame is the highest point."
        key_symbols: [lone figure, flaming staff, rocky outcrop, six climbing shadows, high ground]
        composition: "Figure at the peak, upper center; shadows approach from below in a spread pattern; the outcrop juts upward as a strong diagonal; fire at the apex"
      "8":
        description: "Eight streaks of fire arc across a night sky over open sea, like falling stars or dragon-traces. The sea below is flat black ink; the sky deep grey wash. Each streak is a swift downward brushstroke of burnt amber. A small island sits dark on the water, watching."
        key_symbols: [eight fire streaks, night sky, open sea, falling light, lone island]
        composition: "Fire streaks fill the upper two-thirds, angled downward from left to right; the sea is a dark band below; the island a small solid mark at lower center"
      "9":
        description: "A weary figure crouches behind a wall of eight planted torches, the ninth held ready in hand, watching a dark sea. The torches form a defensive line of amber points. The figure's posture is tense, guarded. Beyond the firelight: only black water and black sky."
        key_symbols: [weary figure, eight planted torches, ninth torch held, defensive wall, dark sea beyond]
        composition: "Torch line runs horizontally across the center; the figure crouches behind at center right; dark sea fills the background; the torches separate light from dark"
      "10":
        description: "A figure carries a heavy bundle of unlit brands up a steep mountain path, village far below as small grey marks. The figure bends under the weight, each step a labor. The path switchbacks upward. Ink darkens toward the summit; the burden is rendered as dense crossed lines."
        key_symbols: [burdened figure, bundle of brands, steep mountain, distant village, climbing path]
        composition: "Figure at center on the ascending diagonal path; village below at lower right; mountain continues upward beyond the frame; the bundle dominates the figure's silhouette"
    court:
      Child:
        description: "A young apprentice holds a lit brand for the first time, face illuminated from below, wonder and fear mixed. Sparks drift upward around them. The fire's amber glow lights only the face and hands — everything else is shadow and suggestion."
        key_symbols: [young apprentice, first flame, lit face from below, drifting sparks, shadow]
        composition: "Figure at center, lit from below; sparks float upward into darkness; the face is the focal point — a small island of warm light in dark ink"
      Seeker:
        description: "A figure stands at the prow of a boat, torch held forward over dark water, sailing toward a volcanic island that glows faint red at the summit. The torch throws light on the bow wave. Everything ahead is uncertain — smoke and sea-mist."
        key_symbols: [figure at prow, forward-held torch, dark water, volcanic island, smoke ahead]
        composition: "Boat cutting from left toward the island at upper right; torch light fans forward; volcanic glow answers from the distance; water dark below"
      Keeper:
        description: "A woman tends a great hearth fire in a stone-walled hall, shadows of carved beams above. The fire is the room's heart — amber and steady. She feeds it with deliberate hands. The hall extends into darkness behind her, but the fire holds the dark at bay."
        key_symbols: [hearth fire, stone hall, tending figure, carved beams, steady flame]
        composition: "Hearth at center with figure beside it; hall recedes into shadow above and behind; the fire's warmth radiates outward as the only color in a grey room"
      Namer:
        description: "A master wizard speaks a word and fire answers — a controlled flame rises from bare rock at his command, casting his shadow enormous on the wall behind. His mouth is open, mid-syllable. The fire obeys the shape of the word. One hand extended, palm down."
        key_symbols: [speaking wizard, commanded fire, enormous shadow, extended hand, fire from rock]
        composition: "Wizard at left, hand extended toward the flame at center; his shadow looms on the wall behind at right, much larger than the figure; fire rises vertically"

  waves:
    pips:
      "1":
        description: "A single bronze bowl overflows with spring water on a mossy stone, ferns curling around its base. The water spills in thin ink lines down the stone's face. Moss is wet-on-wet green-grey bleed. The bowl is a simple dark circle, full to overflowing. Quiet abundance."
        key_symbols: [bronze bowl, spring water, mossy stone, ferns, overflowing]
        composition: "Bowl at center on the stone; water spills downward; ferns frame from below and sides; white space above suggests a forest clearing"
      "2":
        description: "Two figures share a drink on the deck of a small boat, calm sea stretching behind them, islands low on the horizon. One pours, one receives. The sea is a single pale wash; the figures are dark strokes leaning toward each other. Ease and trust."
        key_symbols: [two figures sharing drink, boat deck, calm sea, low islands, pouring and receiving]
        composition: "The two figures at center on the boat; sea opens behind as flat grey; islands are faint horizontal marks; the pouring gesture connects them"
      "3":
        description: "Three women pour water from clay vessels into a shared basin at a village well, celebration around them suggested by loose quick strokes. The well is a dark circle at center. Water arcs from three directions into it. Joy expressed through flowing lines."
        key_symbols: [three women, clay vessels, shared basin, village well, celebration]
        composition: "Well at center; three figures arranged around it pouring inward; celebration suggested at the edges in light brushwork; water arcs converge"
      "4":
        description: "A figure sits under a tree on a shore, back turned to three bronze vessels, a fourth being offered by a hand rising from the tide. The figure does not see it. The tree is a single bold stroke; the three vessels sit ignored; the offered cup catches a hint of light."
        key_symbols: [seated figure, tree shade, three ignored vessels, fourth offered from tide, turned back]
        composition: "Figure under tree at left, facing away; three vessels at center on the ground; the fourth vessel emerges from the tide at right edge — the missed gift"
      "5":
        description: "Three vessels lie overturned on wet rocks, their contents spilled into the sea. Two vessels stand upright behind, untouched. The spilled water merges with rain and tide in grey wash. The two remaining vessels are stable, dark, whole — but the eye goes to the loss."
        key_symbols: [three overturned vessels, wet rocks, two upright vessels behind, spilled water, rain]
        composition: "Overturned vessels in the foreground at center; two upright vessels behind at upper center; wet rocks rendered in dark wash; rain suggested by vertical fine lines"
      "6":
        description: "A child offers a clay cup filled with wildflowers to an elder at a cottage door. The elder reaches down; the child reaches up. The doorway frames the elder in shadow. The flowers are small touches of color — the only brightness. A gesture across generations."
        key_symbols: [child offering, cup of flowers, elder at door, cottage doorway, reaching hands]
        composition: "The two figures at the doorway at center; the child below, the elder above in the frame; flowers are the bright focal point between their hands"
      "7":
        description: "Seven bronze bowls sit on a rock shelf above the sea, each reflecting a different vision in its surface — moon, flame, face, ship, tower, star, eye. The bowls are dark circles in a row; the reflections are tiny detailed marks within. The sea stretches vast and empty behind."
        key_symbols: [seven bronze bowls, rock shelf, different visions reflected, sea behind, mystery]
        composition: "Bowls in a horizontal line across the center; the rock shelf beneath; each bowl contains a different small image; sea and sky fill the background as grey wash"
      "8":
        description: "A cloaked figure walks away from eight vessels left on a beach, heading toward a distant island barely visible in mist. The vessels are arranged in careful rows — abandoned deliberately. The figure's path leads into fog. Footprints in wet sand. Chosen departure."
        key_symbols: [departing figure, eight abandoned vessels, beach, distant island, mist, footprints]
        composition: "Vessels at lower right in neat rows; figure walks away toward upper left; the island is a ghost in the mist; footprints connect vessels to figure"
      "9":
        description: "A satisfied figure sits before nine full vessels in a lamplit room, sea visible through a window. The vessels gleam in warm light. The figure leans back, content. Through the window: moonlit water, the outside world continuing without them. Amber lamplight, grey sea."
        key_symbols: [satisfied figure, nine full vessels, lamplight, sea through window, contentment]
        composition: "Figure seated at left; nine vessels arrayed before them at center; the window at upper right opens onto the grey sea; warm light fills the room"
      "10":
        description: "A family gathers at a long table near the shore, ten vessels between them, a rainbow arcing over the water behind. The figures are quick warm strokes — no faces, only postures of ease. The rainbow is the only spectrum color in the deck, faint and fleeting over grey sea."
        key_symbols: [family at table, ten vessels, shore, rainbow over water, gathering]
        composition: "Table runs horizontally across the lower half; figures seated along it; ten vessels on the surface; the rainbow arcs across the upper half over the sea"
    court:
      Child:
        description: "A young figure stands at the tide line holding an empty cup, watching the sea fill it wave by wave. Each wave leaves a little more. The child is patient, curious, bare feet in the foam. The cup is small in small hands. The sea is enormous."
        key_symbols: [young figure, empty cup, tide line, filling waves, bare feet]
        composition: "Child at center at the waterline; the sea stretches to the horizon behind; each incoming wave drawn as a thin curving line; the cup held at the focal point"
      Seeker:
        description: "A figure in a boat rows through open sea carrying a single precious vessel wrapped in cloth, destination unknown. The sea is grey wash in every direction. The figure rows steadily, the vessel secure between their feet. No land in sight — only purpose."
        key_symbols: [rowing figure, open sea, wrapped vessel, no land visible, steady purpose]
        composition: "Boat at center in vast grey sea; the figure rows; the wrapped vessel is a dark form at the boat's center; horizon divides grey water from grey sky"
      Keeper:
        description: "A woman sits at the edge of a spring-fed pool in a cave, her reflection clear in the still water below. She guards the source. Stalactites drip above in fine ink lines. The pool is the darkest point — deep water holding deep knowledge."
        key_symbols: [woman at pool edge, spring-fed cave, clear reflection, stalactites, guarded source]
        composition: "Figure at the pool's edge at center; reflection visible below in the dark water; cave walls close around; stalactites hang from above; the pool is the heart"
      Namer:
        description: "A master speaks a word over troubled water and it stills — the surface smoothing outward from where the word lands like a stone. Concentric circles spread across the bay. The figure stands on a jetty, mouth open, hand raised. Stillness radiating from sound."
        key_symbols: [speaking master, troubled water stilling, concentric circles, jetty, word as stone]
        composition: "Figure on jetty at left; concentric circles spreading rightward across the bay; the water smooths from agitated strokes near the edges to flat wash at center"

  winds:
    pips:
      "1":
        description: "A single feather stands upright in a crack in a standing stone, a storm gathering behind in dark ink wash. The feather is pale and precise — every barb drawn. The stone is ancient, weathered. The storm approaches but has not arrived. Tension before the word."
        key_symbols: [upright feather, standing stone, gathering storm, crack in stone, tension]
        composition: "Stone at center with the feather at its top; storm builds as dark wash from the right; the feather is the brightest mark on the page; empty ground below"
      "2":
        description: "A blindfolded figure stands at a cliff edge holding two crossed feathers, sea wind pulling at loose hair. The cliff drops away below in sheer dark ink. The feathers form an X against the chest. Balance maintained without sight — only the wind's information."
        key_symbols: [blindfolded figure, two crossed feathers, cliff edge, sea wind, unseen depth]
        composition: "Figure at center on the cliff edge; the drop rendered as black ink below; the two crossed feathers at the chest are the focal point; wind suggested by hair and cloth"
      "3":
        description: "Three rune-carved arrows pin a torn sail to its mast, rain slanting across the page in diagonal ink lines. The sail tears but holds. The arrows are dark precise marks against the pale sail. Rain and wind are the same stroke — diagonal, relentless. A ship enduring."
        key_symbols: [three rune-carved arrows, torn sail, mast, slanting rain, endurance]
        composition: "Mast and sail fill the center vertically; three arrows pin the sail at different points; rain crosses the page diagonally; the ship implied below"
      "4":
        description: "A figure lies on a stone slab in a quiet cave, four feathers arranged at head, feet, and each hand — a ritual of rest or healing. A single candle burns at the figure's side. The cave is rendered in soft grey wash. Silence and deliberate stillness."
        key_symbols: [resting figure, stone slab, four arranged feathers, quiet cave, single candle]
        composition: "Figure horizontal at center on the slab; four feathers at the cardinal points; candle glow as warm point at center; cave walls suggested in grey wash around"
      "5":
        description: "A figure gathers scattered feathers from a windswept beach, others walking away along the shore without looking back. The feathers tumble in the wind as light quick strokes. The departing figures are small and already far. Loss scattered on the sand."
        key_symbols: [gathering figure, scattered feathers, windswept beach, departing figures, wind]
        composition: "Kneeling figure at center gathering feathers; feathers blow across the sand; departing figures recede along the shore at right; wind dominates the composition"
      "6":
        description: "A ferryman poles a flat-bottomed boat through fog, six feathered pennants on the bow marking safe passage. The fog is wet-on-wet white and grey, dissolving everything. The boat and ferryman are the only solid forms. The pennants flutter forward into blankness."
        key_symbols: [ferryman, flat boat, fog, six feathered pennants, poling through mist]
        composition: "Boat crossing from right to left; fog fills the entire background as soft wash; the six pennants at the bow are the leading edge; the ferryman stands tall at center"
      "7":
        description: "A figure slips from a sleeping camp at night carrying bundled scrolls, five feathered markers still standing in the ground behind. Moonlight catches the figure's movement. The camp sleeps in dark ink. The figure is half-shadow, half-gone. Necessary theft or necessary departure."
        key_symbols: [slipping figure, bundled scrolls, sleeping camp, five feathered markers, moonlight]
        composition: "Figure at center moving leftward away from the camp at right; five markers stand in the ground at right; moonlight from upper left catches the figure's edge"
      "8":
        description: "A bound figure sits amid eight feathered stakes driven into sand, cloth over the eyes. Tide marks on the sand say the water has been close. The stakes lean at angles around the figure like a cage of quills. The figure is still — waiting, not struggling."
        key_symbols: [bound figure, eight feathered stakes, sand, blindfold, tide marks]
        composition: "Figure at center surrounded by stakes; the stakes form an irregular circle; tide marks curve across the sand below; the blindfold is the whitest mark"
      "9":
        description: "A figure sits upright in bed, sleepless, nine feathered runes on the wall behind, moonlight through a narrow window. The runes cast faint shadows. The figure's hands grip the blanket. The room is small — walls close. Thoughts that will not quiet."
        key_symbols: [sleepless figure, bed, nine feathered runes, moonlit window, small room]
        composition: "Figure in bed at center; runes arrayed on the wall behind; moonlight enters from the window at right as a bright stripe; the room is cramped, dark"
      "10":
        description: "A figure lies fallen on a shore with ten feathered shafts around them, dawn light breaking over the water. The figure is face down. The shafts lie scattered — not embedded, just fallen with the figure. Dawn light washes the horizon in pale grey-amber. An ending that is also first light."
        key_symbols: [fallen figure, ten feathered shafts, shore, dawn light, ending and beginning]
        composition: "Figure horizontal at lower center; shafts scattered around; dawn breaks at the horizon across the upper third; the light is the gentlest wash in the deck"
    court:
      Child:
        description: "A young figure holds a single feather up to the wind, testing its direction, standing on a hilltop above the sea. Hair and clothes blow sideways. The feather points. The figure listens to what the wind carries — words not yet understood."
        key_symbols: [young figure, single feather, wind testing, hilltop, listening]
        composition: "Figure at center on hilltop; the feather extended upward into the wind; hair and garments blown to the right; sea visible below at the edges"
      Seeker:
        description: "A figure rides the wind in an open boat, scrolls and feathered quills scattered on the bench beside them, chasing a word across the sea. The sail is full and straining. Scrolls flutter. The figure leans forward with the intensity of pursuit."
        key_symbols: [wind-driven boat, scattered scrolls, feathered quills, full sail, pursuit]
        composition: "Boat surging from right to left; sail full at upper center; scrolls and quills on the bench; the figure leans into the wind at the bow"
      Keeper:
        description: "A woman stands in a high tower room surrounded by hanging scrolls and feathered wind-chimes, a window open to the sea wind. She reads the wind's messages. The scrolls sway. The chimes turn. She is the still center around which the air moves."
        key_symbols: [tower room, hanging scrolls, feathered wind-chimes, open window, reading wind]
        composition: "Figure at center in the room; scrolls hang from above around her; the open window at right admits light and wind; chimes catch the movement"
      Namer:
        description: "A master stands on a headland and speaks a true name into the wind — the word visible as a single brushstroke leaving the mouth, carried out over the sea. The wind itself bends around the word. The figure is rooted, the word is flying. Power in naming."
        key_symbols: [speaking master, true name, headland, word as brushstroke, wind bending]
        composition: "Figure at left on the headland; the spoken word extends rightward as a calligraphic stroke over the sea; the wind curves around it; vast sky above"

  stones:
    pips:
      "1":
        description: "A single smooth rune stone rests on a moss-covered altar in dappled forest light. The stone is dark and perfectly round. Moss softens every edge of the altar. Light falls through leaves as pale circles on dark ground. One thing, complete."
        key_symbols: [rune stone, mossy altar, forest light, dappled ground, completeness]
        composition: "Altar at center with the stone on top; light falls from above through unseen canopy; moss renders the altar in soft grey-green; the stone is the darkest point"
      "2":
        description: "A juggler tosses two carved stones at a harbor market, the stones tracing an infinity pattern in the air. The market is suggested by a few quick strokes — awnings, figures. The two stones are caught mid-arc, suspended. Balance in motion."
        key_symbols: [juggler, two carved stones, infinity pattern, harbor market, balance in motion]
        composition: "Juggler at center; the two stones at the top of their arcs forming the infinity shape; market activity suggested at the edges in loose strokes"
      "3":
        description: "Three figures build a stone wall on a hillside, carved keystones visible in the rising structure. Each figure works at a different section. The wall curves across the slope in strong horizontal lines. The keystones are the most detailed marks — craft within labor."
        key_symbols: [three builders, stone wall, hillside, carved keystones, collaborative work]
        composition: "The wall runs horizontally across the center; three figures placed along it; hillside slopes upward behind; keystones drawn with more detail than anything else"
      "4":
        description: "A figure sits on a boulder clutching four rune stones to their chest, a village visible in the valley below. The grip is tight — protection or hoarding. The boulder is a dark mass; the village is small and far. The figure sits above and apart."
        key_symbols: [seated figure, four clutched rune stones, boulder, valley village, distance]
        composition: "Figure on boulder at upper center; village in the valley below at lower center; the four stones pressed to the chest are the focal point; height separates figure from village"
      "5":
        description: "Two ragged figures pass in the rain before a lit window where five rune stones are visible on the sill. Warmth inside, cold outside. The rain is diagonal ink lines; the window is a warm rectangle of amber. The figures are dark, bent, passing. They do not stop."
        key_symbols: [two ragged figures, rain, lit window, five rune stones on sill, exclusion]
        composition: "Window at center glowing with warm light; five stones on the sill; the two figures pass before it at ground level; rain slants across the page"
      "6":
        description: "A figure stands in a doorway distributing rune stones to villagers, hands open and offering. The queue extends outward. Each recipient holds their stone carefully. The doorway frames the giver in shadow; the villagers stand in light. Generosity as balance."
        key_symbols: [giving figure, doorway, rune stones, queue of villagers, open hands]
        composition: "Doorway at center with the figure within; villagers extend outward to the right; each hand-off of a stone creates a small bright point; light outside, shadow within"
      "7":
        description: "A farmer leans on a stone wall regarding seven boundary markers in the fields behind, waiting for harvest. The fields stretch in horizontal bands of grey wash. The markers are dark verticals in the earth. The farmer is still, patient. The land does what the land does."
        key_symbols: [farmer, stone wall, seven boundary markers, fields, patience]
        composition: "Farmer at left leaning on the wall; fields open to the right with seven markers placed among them; horizontal composition — land stretching flat and wide"
      "8":
        description: "A craftsman carves a rune stone by candlelight, eight finished stones in a row beside them. The candle throws sharp shadows. The carving hand is steady; the chisel precise. Each finished stone is identical in size but unique in its rune. Mastery through repetition."
        key_symbols: [craftsman carving, candlelight, eight finished stones, chisel, steady hand]
        composition: "Craftsman at center working; eight completed stones in a line at right; candle at upper left casting light down; the work-in-progress stone is the focal point"
      "9":
        description: "A solitary figure stands in a walled garden, nine carved stones placed in the branches of a fruit tree. The garden is enclosed, private, complete. The wall curves around in brushstroke grey. The stones among branches are dark circles among dark leaves. Abundance earned in solitude."
        key_symbols: [solitary figure, walled garden, nine carved stones, fruit tree, enclosure]
        composition: "Garden enclosed by wall curving across the page; tree at center with stones in its branches; figure standing below; the wall creates intimacy — the world shut out"
      "10":
        description: "A multi-generational family sits at a great stone table, ten carved heirlooms arranged between them — rune stones passed down through hands and years. The table is massive, the figures small around it. A great house rises behind in simple vertical strokes. What endures endures through people."
        key_symbols: [family gathering, stone table, ten heirloom stones, great house, generations]
        composition: "Table horizontal at center; figures of varying size seated around it; ten stones on the surface; the great house rises behind as a strong vertical form; warmth within structure"
    court:
      Child:
        description: "A young figure crouches on a beach, examining a rune stone found in the sand, turning it in both hands. The stone is large in small hands. The beach stretches empty in both directions. Everything starts with picking something up and looking at it closely."
        key_symbols: [crouching child, found rune stone, beach, examination, discovery]
        composition: "Child at center crouching low; the stone held up in both hands; empty beach extending to both sides; sky above as white space; the stone is the entire world"
      Seeker:
        description: "A figure climbs a steep mountain path carrying stone tools — chisel, hammer, measuring cord — destination above the clouds. The path switchbacks upward in strong diagonal strokes. Cloud line cuts the mountain at mid-height. The figure climbs from known ground into the unknown."
        key_symbols: [climbing figure, stone tools, steep mountain, clouds, ascending path]
        composition: "Path diagonal from lower right to upper left; figure at the midpoint climbing; cloud line horizontal across center; the summit hidden above"
      Keeper:
        description: "A woman sits at the threshold of a stone house, hands working clay on a wheel, finished vessels drying in the sun behind her. The wheel turns — a circle within the square doorframe. Her hands are the most detailed element. The house is solid, old, lived in."
        key_symbols: [woman at threshold, clay wheel, stone house, drying vessels, working hands]
        composition: "Doorway framing the figure at center; the wheel before her; vessels lined up behind in the interior; sunlight on the threshold — the border between making and made"
      Namer:
        description: "A master builder places the final keystone in a great arch, the arch framing a view of the sea beyond. The stone fits exactly. The builder's hands release it and the arch holds. Behind the arch: sky, sea, horizon. The work complete, the view revealed."
        key_symbols: [master builder, keystone, great arch, sea through arch, completion]
        composition: "The arch dominates the frame; the builder at the top placing the keystone; through the arch the sea is visible as pale wash; the keystone is the highest and final mark"
