major_arcana:
  - name: "The Fool"
    numeral: "0"
    description: "A barefoot wanderer in tattered linen approaches a ring of standing stones at dusk, bundle swinging from a hazel stick over one shoulder, a wild hare frozen mid-crossing on the path ahead. Bold linocut lines carve the figure against a sky of deep harvest gold fading to charcoal, every stone a black silhouette with visible chisel marks."
    key_symbols: [barefoot wanderer, standing stones, hazel stick bundle, wild hare, dusk sky]
    composition: "Figure enters from left, approaching the stone circle at right; the hare sits dead center on the path, a threshold marker between traveler and stones"

  - name: "The Magician"
    numeral: "I"
    description: "A sharp-featured figure stands at a crossroads altar — a flat slab of granite — with the four suit tokens arranged before them: a burning torch, a brimming cauldron, an iron sickle, and a carved bone. A raven perches overhead on a crooked signpost, ink-black against bone-white sky. Woodblock flatness, every object outlined in thick carved lines."
    key_symbols: [crossroads altar, torch, cauldron, sickle, bone, raven]
    composition: "Central figure behind the altar stone, arms raised; the four objects arrayed in a row before them; raven directly above completing a vertical axis"

  - name: "The High Priestess"
    numeral: "II"
    description: "A veiled figure sits motionless between two towering standing stones, hands resting on knees, a full moon blazing behind the lintel stone that bridges them. A barn owl perches on the lintel, pale as the moon itself. Deep charcoal shadows pool at the base; the veil is carved in flowing linocut grooves."
    key_symbols: [veiled figure, twin standing stones, lintel stone, full moon, barn owl]
    composition: "Perfect symmetry — the two stones form a doorway with the seated figure centered beneath the lintel; moon fills the arch above"

  - name: "The Empress"
    numeral: "III"
    description: "A pregnant figure crowned with braided wheat sheaves sits enthroned on a mossy tangle of ancient roots that form a living chair. Hares crouch at her bare feet among wild strawberries and ferns. Rich harvest gold and forest green dominate; the roots are rendered in bold woodblock curves with visible grain texture."
    key_symbols: [pregnant figure, wheat-sheaf crown, root throne, hares, wild strawberries]
    composition: "Central seated figure fills the frame, roots spreading outward to the edges like a living mandorla; hares symmetrically placed at lower corners"

  - name: "The Emperor"
    numeral: "IV"
    description: "An antlered figure sits on a rough-hewn stone seat at the summit of an Iron Age hill fort, one hand gripping a great oak staff, an iron torc gleaming at the throat. The ramparts curve away behind in stark black lines against a pale sky. Every antler tine is a sharp carved groove in the block."
    key_symbols: [antlered figure, stone seat, hill fort ramparts, oak staff, iron torc]
    composition: "Figure enthroned at center on elevated ground, the concentric rings of the hill fort visible behind and below, staff vertical at right"

  - name: "The Hierophant"
    numeral: "V"
    description: "A masked elder stands in the carved doorway of a dark stave church, face hidden behind a wooden mask of stylized features. Two figures kneel on the threshold before the elder, heads bowed. Candle smoke curls upward in thick linocut wisps. The church's dragon-headed eaves frame the scene in black silhouette."
    key_symbols: [wooden mask, stave church doorway, kneeling figures, candle smoke, dragon eaves]
    composition: "The doorway forms a strong vertical frame; the masked elder stands within it, the two supplicants mirror each other at the threshold step"

  - name: "The Lovers"
    numeral: "VI"
    description: "Two figures face each other across a roaring bonfire, arms extended, fingertips almost touching through the leaping flames. Sparks rise between them like a constellation. The fire is carved in bold, jagged woodblock strokes of dried-blood red and harvest gold against total blackness."
    key_symbols: [two facing figures, bonfire, reaching hands, rising sparks, darkness]
    composition: "Symmetrical — each figure occupies one half, the bonfire a vertical column between them; their almost-touching hands are the focal point at center"

  - name: "The Chariot"
    numeral: "VII"
    description: "A great wicker cart surges down a dark forest path, pulled by two stags with massive antler racks. The driver stands upright gripping a blazing torch that throws wild light across bark and branch. Linocut forest is pure black verticals; the torch casts harsh bone-white highlights on wicker weave."
    key_symbols: [wicker cart, two stags, dark forest path, blazing torch, antlers]
    composition: "Cart drives toward the viewer down a corridor of black trees; the two stags flank the path; torch light radiates from center top"

  - name: "Strength"
    numeral: "VIII"
    description: "A barefoot woman calmly holds open the jaws of a great black dog — a beast the size of a calf — beside a lichen-covered standing stone. Her expression is serene, her grip gentle but absolute. The dog is pure black ink; the woman bone-white; the stone ancient grey with carved spirals."
    key_symbols: [barefoot woman, great black dog, open jaws, standing stone, spiral carvings]
    composition: "Woman and beast form a single horizontal mass at center; the standing stone rises behind them as a vertical anchor; spirals echo the curve of her arms"

  - name: "The Hermit"
    numeral: "IX"
    description: "A cloaked figure walks alone along a moorland ridge under a vast empty sky, carrying a lantern made from bone and horn that casts a small warm circle of light. Heather and gorse are rendered as rough carved textures. The figure is small against the landscape, the horizon line high and bleak."
    key_symbols: [cloaked figure, moorland ridge, bone-and-horn lantern, heather, vast sky]
    composition: "Figure tiny at center of a wide landscape; the ridge line cuts horizontally across the upper third; the lantern is the only warm tone in a field of charcoal and bog brown"

  - name: "Wheel of Fortune"
    numeral: "X"
    description: "A great stone wheel carved with the four seasonal symbols — bud, sun, sheaf, skull — lies half-buried in a barley field, tilted as if slowly turning in the earth. Barley stalks bend around it in carved parallel lines. The wheel's carvings are deep-cut and ancient, lichen-filled."
    key_symbols: [stone wheel, seasonal carvings, barley field, bud, sun, sheaf, skull]
    composition: "The wheel dominates center frame, partially sunken; barley radiates outward from it in all directions; the four seasonal symbols mark the cardinal points"

  - name: "Justice"
    numeral: "XI"
    description: "A blindfolded figure stands at a crossroads where two paths split, holding an iron sickle in one hand and a set of hanging scales in the other. A raven perches on each of the two signposts flanking the figure. Bold black outlines, the blindfold a stark white band across the face."
    key_symbols: [blindfolded figure, crossroads, iron sickle, hanging scales, two ravens]
    composition: "Central standing figure with arms extended horizontally — sickle left, scales right; the two signposts with ravens mirror each other at the edges"

  - name: "The Hanged Man"
    numeral: "XII"
    description: "A wicker effigy in human shape hangs suspended by one ankle from the great limb of an ancient oak, swaying gently. A spray of mistletoe grows exactly where rope meets branch. The oak's bark is rendered in deep woodblock grooves; the wicker figure's weave is meticulous carved crosshatch."
    key_symbols: [wicker effigy, great oak, rope, mistletoe, suspended pose]
    composition: "The oak limb extends from upper left; the hanging figure dangles at center, inverted; mistletoe cluster bright at the attachment point above"

  - name: "Death"
    numeral: "XIII"
    description: "A towering straw effigy blazes in the center of a harvested field at dusk, flames rendered in jagged linocut slashes of dried-blood red and harvest gold. Sparks spiral upward into a darkening sky. The stubble field stretches flat to the horizon in parallel carved lines."
    key_symbols: [burning straw effigy, harvested field, sparks, dusk sky, stubble rows]
    composition: "The burning figure stands dead center, enormous, filling the vertical space; the field recedes in perspective lines to a low horizon; sparks fill the upper third"

  - name: "Temperance"
    numeral: "XIV"
    description: "A patient figure kneels at a holy well ringed with mossy stones, pouring water in a smooth arc from one clay vessel to another. Ferns unfurl from every crack in the stonework. The water's arc is a single clean carved line; the moss and ferns are dense woodblock texture in deep forest green."
    key_symbols: [kneeling figure, holy well, two clay vessels, water arc, ferns, mossy stones]
    composition: "Figure kneels at right, pouring leftward; the well is a dark circle at center; ferns frame the scene from below and sides"

  - name: "The Devil"
    numeral: "XV"
    description: "A great horned mask — carved wood with hollow eyes — is nailed to the trunk of a blackthorn tree, red ribbons trailing from its horns like streamers of blood. Two figures stand chained to the trunk by garlands of wildflowers, their postures slack and willing. The mask's grin is a deep-cut crescent."
    key_symbols: [horned wooden mask, blackthorn tree, red ribbons, chained figures, flower garlands]
    composition: "The mask dominates upper center on the trunk; the two figures flank it below, connected by looping garland-chains; ribbons trail upward into black branches"

  - name: "The Tower"
    numeral: "XVI"
    description: "A stone church steeple splits under a bolt of white lightning, timber beams falling outward, crows scattering in every direction as black ink-splashes against a white sky. The lightning is a single jagged carved line from top to tower. Rubble and birds fill the lower frame in chaotic woodblock energy."
    key_symbols: [stone steeple, lightning bolt, falling timber, scattering crows, rubble]
    composition: "The tower fills the center, cracking from top to base; lightning enters from upper right; crows and debris radiate outward from the point of impact"

  - name: "The Star"
    numeral: "XVII"
    description: "A naked figure kneels at the edge of a dark forest pool, pouring water from a clay vessel onto the earth and into the water simultaneously. Seven pale moths circle above, each one a point of light. The pool is pure black ink; the figure bone-white; the moths harvest gold against a charcoal sky."
    key_symbols: [naked kneeling figure, dark pool, clay vessel, seven moths, poured water]
    composition: "Figure kneels at lower left, the pool spreading to the right; moths arc overhead in a loose constellation pattern; the water streams form two diagonal lines"

  - name: "The Moon"
    numeral: "XVIII"
    description: "A narrow path winds between two ancient burial mounds under a full bone-white moon, bog mist pooling in the hollows. A hare sits on the left mound, a great black dog on the right, both watching the path. The mist is carved as horizontal wavy lines; the moon casts everything in stark black-and-white contrast."
    key_symbols: [winding path, two burial mounds, full moon, hare, black dog, bog mist]
    composition: "Path leads from viewer between the symmetrical mounds toward the moon on the horizon; hare and dog perch on opposite mounds as sentinels"

  - name: "The Sun"
    numeral: "XIX"
    description: "Children dance hand-in-hand around a tall maypole in a sunlit forest clearing, flower garlands streaming from the pole's crown. A white horse grazes at the meadow's edge. The sun is a bold carved disc radiating straight lines; the children are simple joyful silhouettes; garlands loop in clean arcs."
    key_symbols: [dancing children, maypole, flower garlands, white horse, sun disc, clearing]
    composition: "Maypole at center with children circling it; garland ribbons radiate outward; the white horse stands at right edge; the sun blazes directly above"

  - name: "Judgement"
    numeral: "XX"
    description: "Figures rise from split-open barrow graves at the sound of a great bronze horn blown by a robed figure on a hilltop. Earth crumbles from shoulders and hands as the dead emerge. The horn's sound is rendered as radiating carved lines; the barrows crack open in bold black fissures against harvest gold earth."
    key_symbols: [rising figures, barrow graves, bronze horn, robed horn-blower, crumbling earth]
    composition: "Horn-blower stands at top center on the hill; barrows split open across the lower field; emerging figures reach upward toward the sound"

  - name: "The World"
    numeral: "XXI"
    description: "A figure dances with arms raised inside a great wreath woven of wheat sheaves and trailing ivy, suspended in space. The four suit symbols anchor the corners — torch upper-left, cauldron upper-right, sickle lower-left, bone lower-right. The wreath is a thick carved ring of interlocking grain and leaf; the dancer is pure movement."
    key_symbols: [dancing figure, wheat-and-ivy wreath, torch, cauldron, sickle, bone]
    composition: "The wreath forms a perfect circle at center; the dancer fills it; the four corner symbols are bold and separate, framing the whole like a carved seal"

minor_arcana:
  torches:
    pips:
      "1":
        description: "A single torch thrust deep into the earth at a moonlit crossroads, its flame the only light in a vast darkness. The fire is carved in sharp angular strokes of dried-blood red and harvest gold; the crossroads radiate outward as four pale dirt lines into black."
        key_symbols: [single torch, crossroads, flame, darkness]
        composition: "Torch dead center, flame at the top third; the four roads extend to the corners in forced perspective"
      "2":
        description: "Two blazing torches flank a dark doorway in a stone wall, a solitary figure paused between them, head turned as if choosing which threshold to cross. The doorway is a black rectangle; the torches throw competing pools of warm light carved as radiating lines."
        key_symbols: [two torches, stone doorway, choosing figure, competing light]
        composition: "Symmetrical — torches at left and right edges, doorway at center, figure silhouetted in the gap between the two fields of light"
      "3":
        description: "Three torches blaze on a high clifftop, planted in the turf by a cloaked watcher who gazes out to sea where three dark ships ride the horizon. The flames lean in the wind; the sea is carved in bold horizontal waves of charcoal and bone-white."
        key_symbols: [three torches, clifftop, cloaked watcher, distant ships, wind]
        composition: "Torches grouped at upper left on the cliff; the figure stands among them looking right; ships tiny on the distant horizon line"
      "4":
        description: "Four torches mark the corners of a celebration circle where figures dance amid garlands of woven flowers and ivy. The flames are tall and steady; the garlands loop between the torches in carved arcs. Harvest gold light fills the circle against surrounding darkness."
        key_symbols: [four torches, celebration circle, dancing figures, garlands, ivy]
        composition: "The four torches define a square; dancers fill the interior; garlands connect the torches in drooping curves; black night beyond"
      "5":
        description: "Five torches clash in a tangle of arms and sparks as figures scuffle at a harvest fair — stalls overturned, grain scattered. Sparks fly in carved star-bursts of white against the dark. The composition is all diagonal energy and chaotic motion."
        key_symbols: [five clashing torches, scuffling figures, harvest fair, sparks, scattered grain]
        composition: "A knot of figures fills the center, torches crossing at sharp angles; overturned stalls frame the edges; sparks pepper the upper field"
      "6":
        description: "A torchlit procession winds through a night village — six torches held high by marching figures, a victorious person carried aloft on shoulders at the front. Cottage windows glow; the procession is a river of warm carved light through black streets."
        key_symbols: [six torches, night procession, victorious figure, village cottages, glowing windows]
        composition: "Procession moves from right background to left foreground in a diagonal; the carried figure is highest point; cottage silhouettes line both sides"
      "7":
        description: "A lone figure stands atop a ridge brandishing a single torch against six others climbing up from below, their torches bobbing in the dark. The defender's stance is wide and defiant; the ridge is a bold horizontal slash dividing the composition."
        key_symbols: [lone defender, ridge, single torch, six climbing torches, defiance]
        composition: "Defender at top center on the ridge line; six torch-bearers climb from below in a scattered group; the ridge divides the frame horizontally"
      "8":
        description: "Eight torches arc through the night sky like thrown spears over a dark valley, their flames trailing carved streaks of red and gold. The thrower is a silhouette at left on high ground; the valley below is pure black void."
        key_symbols: [eight thrown torches, night sky, fire trails, dark valley, thrower silhouette]
        composition: "Torches arc from upper left to lower right in parallel curves; the thrower is small at the origin point; the valley yawns below"
      "9":
        description: "A battered, weary figure stands behind a crude fence of nine torches planted upright in the earth, watching the darkness beyond with exhausted vigilance. The torches form a palisade of flame; the figure's face is lit from below in stark carved shadow."
        key_symbols: [battered figure, nine planted torches, fence of flame, watching darkness, vigilance]
        composition: "The torch-fence runs horizontally across the lower two-thirds; the figure stands just behind center; pure blackness fills the space beyond"
      "10":
        description: "A bent figure struggles under the weight of ten unlit torches bundled on their back, trudging across an empty moorland under a heavy sky. The torches are a mass of black lines; the moor is sparse and flat; the sky presses down in carved horizontal bands."
        key_symbols: [bent figure, ten unlit torches, bundle, empty moorland, heavy sky]
        composition: "Figure at center moving left, hunched under the enormous bundle; the moor stretches flat to both edges; the sky is oppressively low"
    court:
      Maiden:
        description: "A young figure holds a single torch before them like a question, peering into the mouth of a barrow passage in a grassy hillside. The torch flame illuminates carved stones inside the passage. Eyes wide, stance eager, one foot on the threshold."
        key_symbols: [young figure, single torch, barrow passage, carved stones, threshold]
        composition: "Figure at right, torch extended leftward into the dark passage mouth; the hill rises above; carved stones visible just inside the opening"
      Hunter:
        description: "A fierce figure on horseback gallops through a birch forest at night, torch held high, cloak streaming. The horse is wild-eyed; birch trunks flash white in the torchlight like bone pillars. Motion is carved in long diagonal strokes."
        key_symbols: [mounted hunter, galloping horse, birch forest, streaming torch, night ride]
        composition: "Horse and rider charge from left to right across the frame; birch trunks create a vertical rhythm behind; the torch trails flame leftward with speed"
      Crone:
        description: "An old woman sits beside a great hearth fire, torch propped beside her chair, spinning wool by firelight. Her face is a map of deep-carved lines; the fire fills the background with bold angular flame shapes. A cat's eyes gleam from the shadows."
        key_symbols: [old woman, hearth fire, spinning wool, propped torch, cat's eyes]
        composition: "The crone sits at center-right facing left; the hearth dominates the left half; the torch leans vertically at far right; cat eyes glow low in the dark corner"
      Horned King:
        description: "A figure wearing a great antlered headdress stands on a hilltop holding a massive torch that lights the entire summit, robes heavy with embroidered flame patterns. The antlers branch wide as oak limbs; the torch fire merges with the sky in bold carved strokes."
        key_symbols: [antlered headdress, hilltop, massive torch, embroidered robes, fire and sky merging]
        composition: "Figure stands at center on the summit, filling the frame from bottom to near-top; antlers extend to both edges; the torch flame becomes the sky above"

  cauldrons:
    pips:
      "1":
        description: "A single stone cauldron sits on a rough altar of stacked slate, overflowing with clear spring water that spills down the sides. Unfurling fern fronds frame the scene; the water is carved as flowing parallel lines catching light. Deep forest green and bone-white."
        key_symbols: [stone cauldron, slate altar, overflowing water, fern fronds]
        composition: "Cauldron at center on the altar; water cascades downward in carved rivulets; ferns arch inward from both sides creating a natural frame"
      "2":
        description: "Two figures sit facing each other beside a gentle stream, each holding a small cauldron, drinking in unison. Willows trail overhead; the stream flows between them in bold carved curves. The mood is quiet intimacy, rendered in soft grey tones with bone-white highlights."
        key_symbols: [two figures, paired cauldrons, stream, willow branches, shared drink]
        composition: "Figures mirror each other at left and right; the stream flows between them horizontally at bottom; willows drape from above creating an arch"
      "3":
        description: "Three women dance in a ring around a great cauldron at a harvest feast, their skirts carved as swirling arcs. The cauldron steams with abundance; a laden table curves behind them. Harvest gold and deep bog brown dominate; the dance is joyful circular motion."
        key_symbols: [three dancing women, great cauldron, steam, harvest feast, laden table]
        composition: "The cauldron anchors center; the three women circle it with linked hands; the feast table curves across the background"
      "4":
        description: "A brooding figure sits beneath a great oak with arms crossed, ignoring three cauldrons set before them on the grass. A fourth cauldron is offered by a pale hand extending from the oak's trunk. The figure's refusal is a rigid carved silhouette; the hand is ghostly, bark-textured."
        key_symbols: [brooding figure, great oak, three ignored cauldrons, phantom hand, fourth cauldron]
        composition: "Figure slumped against the oak at right; three cauldrons in a row at lower left; the spectral hand reaches from the trunk offering the fourth at center"
      "5":
        description: "Three cauldrons lie overturned on flagstones, their contents spilled in dark spreading pools. Two cauldrons remain upright in the background, untouched. A figure stands with head bowed amid the wreckage. The spilled liquid is carved as bold black shapes against pale stone."
        key_symbols: [three overturned cauldrons, spilled liquid, two standing cauldrons, bowed figure, flagstones]
        composition: "Overturned cauldrons and spill dominate the foreground; the bowed figure stands at center; the two intact cauldrons sit elevated in the background"
      "6":
        description: "A child in a doorway offers a small cauldron brimming with wildflowers to a stooped elder who reaches down with gnarled hands. The doorframe is carved with protective symbols; light spills from within. Tenderness rendered in bold simple shapes, forest green and harvest gold."
        key_symbols: [child, small flower-filled cauldron, stooped elder, carved doorframe, warm light]
        composition: "The doorway frames the scene vertically; child inside at left, elder outside at right; the small cauldron passes between them at the center point"
      "7":
        description: "Seven cauldrons float in thick bog mist, each containing a different vision — a flame, a face, a serpent, a star, a skull, a rose, a key. A figure stands before them, hand outstretched, trying to choose. Each cauldron glows faintly from within; the mist is carved as layered horizontal waves."
        key_symbols: [seven floating cauldrons, bog mist, seven visions, choosing figure]
        composition: "Cauldrons arranged in a loose arc across the middle band; the figure stands below at center; mist fills every space between in carved layers"
      "8":
        description: "A cloaked figure walks away from eight neatly stacked cauldrons toward a distant mountain pass, back turned, staff in hand. The cauldrons are arranged in a careful pyramid; the path ahead is steep and bare. The figure is small against the mountain; the abandoned cauldrons large in the foreground."
        key_symbols: [departing figure, eight stacked cauldrons, mountain pass, walking staff, bare path]
        composition: "Cauldrons stacked at lower right in the foreground; the figure walks away toward upper left; the mountain pass frames the distant destination"
      "9":
        description: "A contented figure sits enthroned before nine full cauldrons arranged on a long feasting table, arms spread wide in satisfaction. Rich fabrics drape the chair; the cauldrons gleam. Every surface is carved with abundance textures — grain, fruit, flowing liquid."
        key_symbols: [satisfied figure, nine full cauldrons, feasting table, rich fabrics, abundance]
        composition: "The figure sits at center behind the table; nine cauldrons spread across the table in a row; drapery and plenty fill every corner"
      "10":
        description: "A family of many generations gathers at a riverside around ten cauldrons of varying sizes, sharing food and drink. A rainbow arcs through mist rising from the water. The river flows across the bottom; the family groups naturally around the cauldrons; the rainbow is carved in bold concentric bands."
        key_symbols: [multi-generational family, ten cauldrons, riverside, rainbow, mist]
        composition: "River runs along the bottom edge; family gathered in the middle band around clustered cauldrons; rainbow arcs across the upper third through rising mist"
    court:
      Maiden:
        description: "A young figure kneels at the edge of a dark bog pool, gazing at their own reflection in a small cauldron filled with still water. Cattails and marsh grass frame the scene. The reflection shows a different, older face. Rendered in charcoal and bone-white with deep bog brown."
        key_symbols: [kneeling youth, cauldron mirror, bog pool, altered reflection, cattails]
        composition: "Figure kneels at lower right, leaning over the cauldron at center; the bog stretches behind; the reflection in the cauldron is the hidden focal point"
      Hunter:
        description: "A mounted figure splashes through a shallow ford, cauldron lashed to the saddle, water spraying in bold carved arcs. The horse lunges forward; reeds part around them. The rider's expression is urgent, questing. Dark water and white spray create dramatic contrast."
        key_symbols: [mounted rider, lashed cauldron, river ford, splashing water, parting reeds]
        composition: "Horse and rider drive from left to right through the center; water sprays upward in symmetrical arcs; reeds frame both sides"
      Crone:
        description: "An ancient woman stirs a great cauldron over a low peat fire in a stone cottage, dried herbs hanging from every beam above. Steam rises and curls into shapes that suggest faces and futures. Her stirring hand is the calm center; the herb bundles are dense carved textures overhead."
        key_symbols: [ancient woman, great cauldron, peat fire, dried herbs, prophetic steam]
        composition: "The crone stands at center over the cauldron; the fire glows below; herbs hang from the beams across the top; steam rises and fills the upper space with visions"
      Horned King:
        description: "A figure with a crown of antlers sits on a throne of river stones beside a great waterfall, holding an enormous cauldron on one knee as if it were a drinking cup. The waterfall roars behind in bold vertical carved lines; the figure is massive, still, lord of all that flows."
        key_symbols: [antler-crowned figure, river stone throne, waterfall, enormous cauldron, stillness]
        composition: "Figure enthroned at center-left; the waterfall cascades down the right half; the cauldron rests on the knee at the meeting point of figure and water"

  sickles:
    pips:
      "1":
        description: "A single iron sickle driven deep into a weathered tree stump, its blade catching a flash of lightning from the storm clouds massing above. The stump grain is carved in concentric rings; the sickle is stark black iron against pale wood. The sky churns with bold angular storm shapes."
        key_symbols: [iron sickle, tree stump, lightning flash, storm clouds]
        composition: "Stump at center with the sickle embedded vertically; lightning cuts down from upper right; storm fills the sky in carved angular masses"
      "2":
        description: "A blindfolded figure stands on a sea cliff holding two sickles crossed before their chest, blades outward. The sea stretches behind under cold moonlight, waves carved as repeating curved lines. The pose is tense equilibrium; the blindfold a stark white band."
        key_symbols: [blindfolded figure, two crossed sickles, sea cliff, moonlight, waves]
        composition: "Figure at center on the cliff edge; crossed sickles form an X at the chest; the sea fills the background in horizontal wave-bands; moon upper right"
      "3":
        description: "Three iron sickles pin a corn dolly to a wooden door, driven through its arms and heart. Rain lashes down in carved diagonal lines. The door is ancient oak with iron studs; the dolly is a crude woven figure; the sickles are brutal, final."
        key_symbols: [three sickles, corn dolly, wooden door, rain, iron studs]
        composition: "The door fills the frame; the corn dolly is spread at center, pinned by the three sickles; rain slashes diagonally across the entire surface"
      "4":
        description: "A figure lies in repose on a stone tomb with four sickles placed around them at head, feet, and both hands. Stained glass casts colored light from above in carved geometric shapes. The figure is perfectly still; the sickles are ceremonial, arranged with ritual precision."
        key_symbols: [reclining figure, stone tomb, four sickles, stained glass, ritual arrangement]
        composition: "The tomb is horizontal across the center; the figure lies upon it; four sickles mark the cardinal points; stained glass patterns fill the upper background"
      "5":
        description: "A lone figure gathers scattered sickles from muddy ground while two others walk away down a rain-soaked road, their backs turned. Five sickles total — three on the ground, two being carried off. The gatherer's posture is defeat; the road stretches away in carved perspective lines."
        key_symbols: [gathering figure, scattered sickles, departing figures, muddy ground, rain-soaked road]
        composition: "Kneeling figure at center-right picking up sickles; two figures recede down the road at left; the road vanishes to a distant point; scattered blades catch dim light"
      "6":
        description: "A ferryman poles a flat-bottomed boat across dark calm water, six sickles bundled and lashed as cargo amidships. The water is pure black ink; the boat a simple carved shape; the ferryman a tall silhouette with a long pole. Mist clings to the surface in thin horizontal lines."
        key_symbols: [ferryman, flat boat, six bundled sickles, dark water, mist, pole]
        composition: "Boat moves horizontally across the center; ferryman stands at the stern at right; sickle bundle at center of the boat; water and mist fill above and below"
      "7":
        description: "A furtive figure creeps away from a sleeping camp in darkness, arms full of sickles taken from the earth where five more remain planted. The camp's fire is a low red glow; the thief is hunched and shadowed; the remaining sickles stand like sentinels in a row."
        key_symbols: [creeping thief, stolen sickles, sleeping camp, low fire, planted sickles]
        composition: "The thief moves from right to left in the foreground; the camp and fire glow at upper right background; the five remaining sickles stand in a line at center"
      "8":
        description: "A bound figure sits on bare earth surrounded by eight sickles driven into the ground in a tight circle, a cloth tied over the eyes. The sickle blades curve inward like teeth. The figure is motionless, resigned. Stark black iron against pale earth; the circle is a cage of edges."
        key_symbols: [bound figure, blindfold, eight sickles, earth circle, imprisonment]
        composition: "The figure sits at dead center; the eight sickles ring them in a perfect circle; bare earth fills the frame; the composition is claustrophobic and centered"
      "9":
        description: "A gaunt figure sits upright on a straw-stuffed bed in a bare stone cell, awake in the dark. Nine sickles hang in a row on the wall behind, blades catching faint light from a high slit window. Insomnia and dread carved in the rigid upright posture; the sickles gleam like crescent moons."
        key_symbols: [wakeful figure, straw bed, nine hanging sickles, stone cell, slit window]
        composition: "Figure at center-left on the bed; the nine sickles form a horizontal line across the wall behind; the slit window casts a narrow diagonal of light from upper right"
      "10":
        description: "A figure lies fallen face-down on a field road, ten sickles driven into the earth around them in a scattered pattern. Dawn breaks on the horizon in thin bands of harvest gold. The figure is utterly still; the sickles stand at angles like a thicket of curved iron. It is over."
        key_symbols: [fallen figure, ten sickles, field road, dawn light, stillness]
        composition: "Figure prone at center; sickles scattered around them filling the middle ground; the road extends to the horizon where dawn light seeps in thin horizontal bands"
    court:
      Maiden:
        description: "A young figure examines a single sickle held up to the light, turning it thoughtfully, standing in a field of uncut grain. The wind bends the grain in carved parallel curves; the sickle catches the sky's reflection on its blade. Curiosity and the weight of first knowledge."
        key_symbols: [young figure, raised sickle, uncut grain field, wind, reflected light]
        composition: "Figure at center holding the sickle up at eye level; grain stretches to all edges; the wind bends everything leftward; the blade is the brightest point"
      Hunter:
        description: "A swift figure on foot strides through a dark birch forest with sickle drawn, tracking something unseen. Birch bark is carved as white vertical slashes against black; the hunter moves between them like a blade between ribs. The sickle extends forward, leading the way."
        key_symbols: [striding hunter, drawn sickle, birch forest, tracking, forward motion]
        composition: "Figure moves from right to left through the center; birch trunks create a vertical grid; the sickle at arm's length breaks the pattern, pointing the direction of pursuit"
      Crone:
        description: "A sharp-eyed old woman sits in a high-backed chair with a sickle across her lap, judging all who approach. Behind her, a tapestry of woven scenes — harvests, battles, trials. Her gaze is the focal point, direct and carved with unflinching lines. The sickle rests ready but still."
        key_symbols: [sharp-eyed crone, high-backed chair, lap sickle, woven tapestry, judgment gaze]
        composition: "The crone sits at center facing the viewer; the tapestry fills the wall behind; the sickle lies horizontal across her knees; her eyes are the sharpest carved detail"
      Horned King:
        description: "A towering antlered figure stands on a ridge holding a great war-sickle — enormous, ceremonial — against a sky torn by wind. The robes snap sideways; the antlers branch like lightning. Authority and severance embodied in a single carved silhouette of absolute black against bone-white storm sky."
        key_symbols: [antlered figure, great war-sickle, ridge, wind-torn sky, snapping robes]
        composition: "Figure fills the frame from bottom to top at center; the sickle is held vertically at right; antlers spread to both upper corners; the sky rages behind"

  bones:
    pips:
      "1":
        description: "A single massive animal skull sits on a mossy altar stone, gold coins gleaming in its eye sockets like twin suns. Moss and lichen creep across the stone in carved organic textures. The skull is bone-white against deep forest green; the gold is the only warm tone. Ancient wealth and ancestral offering."
        key_symbols: [animal skull, mossy altar, gold coins in eye sockets, lichen]
        composition: "The skull dominates center frame on the altar; moss grows up from below and around; the coin-eyes catch light and draw focus to the skull's gaze"
      "2":
        description: "A juggler at a market fair tosses two carved bone discs in the air, tracing a figure-eight path between their hands. The crowd is suggested in loose carved shapes behind; the discs are detailed with spiral engravings. Motion and balance, the infinity loop rendered in bold arcing lines."
        key_symbols: [juggler, two bone discs, infinity path, market fair, spiral engravings]
        composition: "Juggler at center, arms raised; the two discs trace an infinity symbol in the air above; market stall shapes fill the background loosely"
      "3":
        description: "Three figures build a dry-stone wall together, each setting a bone-carved keystone into place at the same moment. The wall curves across the landscape; the keystones are marked with protective runes. Collaborative labor rendered in sturdy horizontal lines and the weight of lifted stone."
        key_symbols: [three builders, dry-stone wall, bone keystones, protective runes, landscape]
        composition: "The wall runs horizontally across the center; the three figures are spaced evenly along it, each lifting a keystone; the landscape rolls behind in carved contours"
      "4":
        description: "A hunched figure crouches atop a barrow mound clutching four bone tokens to their chest, eyes darting, body curled protectively. A village with lit windows is visible in the far distance below. Isolation and hoarding carved in the tight curved posture; the tokens are pale against dark robes."
        key_symbols: [hunched miser, barrow mound, four bone tokens, distant village, lit windows]
        composition: "Figure crouched at center on the mound's peak; the mound slopes away to both sides; the village glows tiny in the lower background; the tokens are clutched at the figure's center"
      "5":
        description: "Two ragged figures trudge through falling snow past a stone church whose lit window reveals five bone tokens arranged on the sill inside. The figures hunch against the cold; the warm window is the only light. Carved snowflakes are bold white dots against charcoal; the contrast of warmth and want is stark."
        key_symbols: [two ragged figures, snow, lit church window, five bone tokens, cold and warmth]
        composition: "Figures walk left to right in the foreground; the church window glows at center-right; bone tokens visible on the sill; snow fills the sky in carved dots"
      "6":
        description: "A wealthy figure in heavy robes stands in a stone archway distributing bone tokens to kneeling villagers who reach upward with open hands. The archway is carved with interlocking patterns; the tokens pass downward; the scene is a careful balance of above and below, giving and receiving."
        key_symbols: [wealthy figure, stone archway, bone tokens, kneeling villagers, giving hands]
        composition: "The benefactor stands elevated in the archway at center; villagers kneel in a semicircle below; bone tokens are mid-air between the hands; the arch frames everything"
      "7":
        description: "A farmer leans on a wooden fence at dusk, regarding seven bone-marked boundary posts that march across the landscape into the distance. Each post is carved with a different ancestor's mark. Patience and stewardship in the leaning posture; the posts recede in careful perspective."
        key_symbols: [leaning farmer, wooden fence, seven boundary posts, ancestor marks, dusk]
        composition: "Farmer at left foreground leaning on the fence; the seven posts march from lower right to upper left in diminishing perspective; dusk sky above in horizontal bands"
      "8":
        description: "A craftsman works by candlelight, carving bone tokens with precise tools. Eight finished pieces sit in a neat row before them on the workbench, each unique. The candle is the sole light source; the tools cast sharp shadows; the focus and dedication are carved in the steady hands and bent concentration."
        key_symbols: [craftsman, candlelight, carving tools, eight finished bone tokens, workbench]
        composition: "Craftsman at center-left, bent over the work; the eight tokens line the bench in the foreground; candlelight radiates from upper center casting everything in dramatic side-light"
      "9":
        description: "A solitary figure stands in a walled garden where nine bone talismans hang from the branches of a great pear tree, turning slowly in the breeze. The garden walls are high; the tree is ancient and generous. Solitude and earned abundance; the talismans are carved with fine detail, each one distinct."
        key_symbols: [solitary figure, walled garden, nine bone talismans, pear tree, breeze]
        composition: "The tree fills the center and upper frame; talismans hang among its branches at various heights; the figure stands below looking up; garden walls enclose the edges"
      "10":
        description: "A multi-generational family gathers at a long oak table in a great house, ten bone heirlooms arranged as a centerpiece — each one passed down through a different line. The house timbers arch overhead; the family spans from infant to ancient. Legacy and continuity carved in the long horizontal table and the gathered faces."
        key_symbols: [multi-generational family, long oak table, ten bone heirlooms, great house timbers, gathered faces]
        composition: "The table runs horizontally across the lower two-thirds; family members line both sides; the ten heirlooms cluster at the center of the table; the house's arched timbers frame above"
    court:
      Maiden:
        description: "A young figure crouches at the entrance of a barrow tomb, holding up a single bone token found in the earth, examining it with wonder. Soil clings to their hands; the barrow opens behind like a dark mouth. Discovery and inheritance, the first contact with what the ancestors left behind."
        key_symbols: [crouching youth, bone token, barrow tomb entrance, soil-covered hands, discovery]
        composition: "Figure at center-right crouching, holding the token up to catch light; the barrow entrance yawns dark behind at left; earth and roots frame the scene"
      Hunter:
        description: "A determined figure rides a heavy draft horse across open farmland, saddlebags bulging with bone tokens, cloak flying. The horse is thick-legged and powerful; the land is flat and wide. Purpose and material pursuit carved in the forward lean and the horse's driving stride."
        key_symbols: [mounted rider, draft horse, saddlebags of bone tokens, open farmland, flying cloak]
        composition: "Horse and rider move from left to right across the center; flat farmland stretches to both edges; the cloak streams behind; saddlebags are prominent at the horse's flanks"
      Crone:
        description: "An old woman sits in a stone chair by a roaring fire, a carved bone staff across her knees, surrounded by shelves of preserved herbs, dried meats, and stored grain. She is the keeper of the household's wealth, every provision accounted for. Carved abundance fills every shelf in dense woodblock texture."
        key_symbols: [old woman, stone chair, bone staff, roaring fire, stocked shelves, provisions]
        composition: "The crone sits at center before the fire; shelves rise on both sides stacked with goods; the bone staff lies horizontal; firelight illuminates the stores"
      Horned King:
        description: "A massive antlered figure sits on a stone throne at the center of a great barrow chamber, surrounded by heaped grave goods — gold, bone carvings, iron tools, woven cloth. The antlers nearly touch the chamber ceiling. This is the ancestor who owns the land itself, whose bones are the foundation. Total stillness and absolute dominion carved in heavy black masses."
        key_symbols: [antlered figure, stone throne, barrow chamber, grave goods, ancestral dominion]
        composition: "Figure enthroned at center filling the chamber; grave goods heap around the base of the throne; the low ceiling presses down; antler tips touch the carved stone above"
