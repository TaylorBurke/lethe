        composition: "The figure lies horizontal at center on the slab; three swords hang vertically on the wall above; the stained glass window glows at left; the hidden sword is visible below"
      "5":
        description: "Bold psychedelic poster art, flat saturated color fields with heavy black outlines, Art Nouveau flowing curves — a smirking figure holds three swords while two defeated figures walk away in the background, two swords left on the ground. Storm clouds gather overhead. A hollow victory. Electric purple, acid orange, and silver dominate, graphic flatness like a Fillmore concert poster."
