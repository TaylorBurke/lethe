      "9":
        description: "Bold psychedelic poster art, flat saturated color fields with heavy black outlines, Art Nouveau flowing curves — a figure sits upright in bed, head in hands in anguish. Nine swords hang in a row on the dark wall behind. Moonlight cuts through a window casting a sharp beam across the scene. Anxiety and sleepless worry. Deep indigo, silver, and electric purple dominate, graphic flatness like a Fillmore concert poster."
