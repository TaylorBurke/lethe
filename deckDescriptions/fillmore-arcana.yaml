      "2":
        description: "Bold psychedelic poster art, flat saturated color fields with heavy black outlines, Art Nouveau flowing curves — a blindfolded figure sits on a stone bench holding two crossed swords, balanced in perfect tension. A crescent moon hangs over calm water behind. A decision suspended in stillness. Silver, deep indigo, and electric purple dominate, graphic flatness like a Fillmore concert poster."
