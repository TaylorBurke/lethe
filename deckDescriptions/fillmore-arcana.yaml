      "1":
        description: "Bold psychedelic poster art, flat saturated color fields with heavy black outlines, Art Nouveau flowing curves — a hand from a cloud grips an upright sword, a crown balanced at the tip adorned with an olive branch and a palm frond. Mountain peaks rise below through dissipating fog. Clarity cuts through obscurity. Silver, cyan, and electric purple dominate, graphic flatness like a Fillmore concert poster."
