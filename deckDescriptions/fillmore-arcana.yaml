      "3":
        description: "Bold psychedelic poster art, flat saturated color fields with heavy black outlines, Art Nouveau flowing curves — three swords pierce a red heart against a storm sky, rain falling in bold diagonal lines. A graphic symbol of heartbreak rendered as a bold poster image. The heart is hot pink, the swords silver, the storm electric purple. Graphic flatness like a Fillmore concert poster."
