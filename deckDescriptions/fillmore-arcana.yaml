        composition: "The boat moves horizontally across the center; six swords stand in a row in the hull; the ferryman poles at the stern; the woman and child sit in the bow; calm water reflects below"
      "7":
        description: "Bold psychedelic poster art, flat saturated color fields with heavy black outlines, Art Nouveau flowing curves — a figure sneaks away from a camp carrying five swords bundled in arms, looking back over one shoulder. Two swords remain planted in the ground behind at the camp. A risky scheme under a dim sky. Electric purple, deep indigo, and acid orange dominate, graphic flatness like a Fillmore concert poster."
