        composition: "The smirking figure stands at center foreground holding three swords; the two departing figures recede into the background; two swords lie on the ground between them"
      "6":
        description: "Bold psychedelic poster art, flat saturated color fields with heavy black outlines, Art Nouveau flowing curves — a ferryman poles a boat with six swords standing upright in the hull. A woman and child sit as passengers. The water is calm, reflecting the sky. Moving to safer ground. Cyan, silver, and deep indigo dominate, graphic flatness like a Fillmore concert poster."
