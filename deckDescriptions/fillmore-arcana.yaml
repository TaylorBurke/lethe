        composition: "The figure sits at center in the bed; nine swords hang horizontally on the wall behind in three rows of three; the moonlight beam cuts diagonally from upper left"
      "10":
        description: "Bold psychedelic poster art, flat saturated color fields with heavy black outlines, Art Nouveau flowing curves — a figure lies face-down on the ground with ten swords in the back. A dawn sky glows over water on the horizon — the worst has happened but the sun is rising. The ten swords create a graphic pattern. Deep indigo, gold dawn light, and silver dominate, graphic flatness like a Fillmore concert poster."
