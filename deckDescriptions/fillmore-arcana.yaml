major_arcana:
  - name: "The Fool"
    numeral: "0"
    description: "Bold psychedelic poster art, flat saturated color fields with heavy black outlines, Art Nouveau flowing curves — a barefoot figure in bell-bottoms and a fringed vest stepping off a rainbow-striped cliff edge, a flower tucked behind one ear, a small dog with a bandana bounding alongside. A massive sunburst radiates behind in concentric rings of acid orange and hot pink. Hair and fringe flow as decorative tendrils. Acid orange, electric purple, and chartreuse dominate, graphic flatness like a Fillmore concert poster."
    key_symbols: [barefoot figure, bell-bottoms, fringed vest, rainbow cliff, flower behind ear, bandana dog, sunburst]
    composition: "Figure steps from left toward the rainbow cliff edge at center-right; the dog follows at lower left; the sunburst fills the upper half behind the figure"

  - name: "The Magician"
    numeral: "I"
    description: "Bold psychedelic poster art, flat saturated color fields with heavy black outlines, Art Nouveau flowing curves — a figure at a low table draped in paisley cloth with wand, cup, sword, and pentacle arranged before them, one hand raised holding a crystal that catches light, a mandala halo radiating behind the head in concentric geometric rings. The paisley cloth patterns echo the mandala above. Electric purple and gold dominate, hot pink accents, graphic flatness like a Fillmore concert poster."
    key_symbols: [paisley table, crystal, wand, cup, sword, pentacle, mandala halo]
    composition: "Central figure behind the low table, one arm raised vertically; the four tools arrayed in a row on the table; the mandala halo fills the space behind and above the head"

  - name: "The High Priestess"
    numeral: "II"
    description: "Bold psychedelic poster art, flat saturated color fields with heavy black outlines, Art Nouveau flowing curves — a woman seated between two pillars wrapped in flowering vines, a crescent moon crown on her head, a scroll resting open in her lap. Owl eyes peer from the dark background behind her. An ornate Art Nouveau border of interlocking curves frames the entire scene. Deep indigo and silver dominate, with cyan vine accents, graphic flatness like a Fillmore concert poster."
    key_symbols: [seated woman, vine-wrapped pillars, crescent moon crown, scroll, owl eyes, Art Nouveau border]
    composition: "Perfect symmetry — the two vine-wrapped pillars frame left and right edges; the seated figure is centered between them; the crescent moon sits directly above her head"

  - name: "The Empress"
    numeral: "III"
    description: "Bold psychedelic poster art, flat saturated color fields with heavy black outlines, Art Nouveau flowing curves — a woman reclining in a field of giant sunflowers and poppies, her flowing hair merging with the flower stems in sinuous Art Nouveau tendrils. A Venus symbol adorns her headband. Fruit and bread are arranged at her side. Chartreuse, hot pink, and gold dominate, graphic flatness like a Fillmore concert poster."
    key_symbols: [reclining woman, giant sunflowers, poppies, Venus headband, flowing hair as stems, fruit and bread]
    composition: "The reclining figure fills the lower two-thirds; sunflowers and poppies tower above and around her; her hair flows outward becoming flower stems at the edges"

  - name: "The Emperor"
    numeral: "IV"
    description: "Bold psychedelic poster art, flat saturated color fields with heavy black outlines, Art Nouveau flowing curves — a figure seated on a throne made of stacked amplifiers, legs crossed, a ram's head medallion gleaming on the chest. A desert mesa landscape stretches behind in flat color bands. Bold geometric patterns cover the robes in angular Op Art stripes. Acid orange and electric purple dominate, gold accents, graphic flatness like a Fillmore concert poster."
    key_symbols: [amplifier throne, ram's head medallion, geometric robes, desert mesa, crossed legs]
    composition: "The figure sits centered on the amplifier stack; the mesa landscape extends horizontally behind; geometric robe patterns draw the eye inward to the ram medallion at center"

  - name: "The Hierophant"
    numeral: "V"
    description: "Bold psychedelic poster art, flat saturated color fields with heavy black outlines, Art Nouveau flowing curves — a guru figure seated cross-legged on a raised platform, two students kneeling before them. Incense smoke rises and curls into sacred geometry patterns — mandalas and yantras forming in the air. A peacock feather fan spreads behind the guru. A temple archway frames the entire scene. Deep purple and gold dominate, cyan smoke accents, graphic flatness like a Fillmore concert poster."
    key_symbols: [guru figure, raised platform, kneeling students, incense sacred geometry, peacock feather fan, temple arch]
    composition: "The temple archway frames the scene; the guru sits elevated at center; the two students kneel symmetrically below; incense smoke rises and fills the arch above with geometric forms"

  - name: "The Lovers"
    numeral: "VI"
    description: "Bold psychedelic poster art, flat saturated color fields with heavy black outlines, Art Nouveau flowing curves — two figures embracing beneath a giant blooming tree, a winged figure visible in the branches above, the sun directly overhead blazing in concentric rings. Their clothes are patterned with complementary paisley designs that interlock where they touch. Hot pink and electric purple dominate, gold sunlight accents, graphic flatness like a Fillmore concert poster."
    key_symbols: [embracing couple, blooming tree, winged figure, overhead sun, complementary paisley patterns]
    composition: "The great tree fills the frame from top to bottom; the embracing couple stands at its base center; the winged figure sits in the branches above; the sun crowns the tree at top"

  - name: "The Chariot"
    numeral: "VII"
    description: "Bold psychedelic poster art, flat saturated color fields with heavy black outlines, Art Nouveau flowing curves — a figure standing upright in a VW van converted to a chariot, the van painted with stars and moons in swirling patterns. Two sphinxes — one black, one white — pull it forward. A highway stretches to the horizon behind in forced perspective. Cyan, gold, and electric purple dominate, graphic flatness like a Fillmore concert poster."
    key_symbols: [VW van chariot, star-and-moon paint, black sphinx, white sphinx, highway horizon]
    composition: "The van-chariot drives toward the viewer at center; the two sphinxes flank the front; the highway recedes to a vanishing point directly behind"

  - name: "Strength"
    numeral: "VIII"
    description: "Bold psychedelic poster art, flat saturated color fields with heavy black outlines, Art Nouveau flowing curves — a woman with flowers woven in her hair gently holds open the jaws of a great lion, both utterly calm. A peace sign pendant hangs at her throat. Wildflowers grow lush around the lion's paws in Art Nouveau tendrils. Gold, chartreuse, and hot pink dominate, graphic flatness like a Fillmore concert poster."
    key_symbols: [flower-haired woman, lion, open jaws, peace sign pendant, wildflowers]
    composition: "Woman and lion form a single horizontal group at center; her hands frame the lion's open jaws as the focal point; wildflowers spread outward from the base"

  - name: "The Hermit"
    numeral: "IX"
    description: "Bold psychedelic poster art, flat saturated color fields with heavy black outlines, Art Nouveau flowing curves — a solitary figure on a mountain trail at twilight, holding up a lantern with a glowing star inside. A long walking stick in the other hand. A patchwork cloak of many colors wraps the figure. Distant festival lights twinkle in the valley far below. Deep indigo and violet dominate, gold lantern glow, graphic flatness like a Fillmore concert poster."
    key_symbols: [solitary figure, star lantern, walking stick, patchwork cloak, mountain trail, distant festival lights]
    composition: "The figure stands at upper right on the trail, holding the lantern high; the mountain path winds downward to the left; festival lights dot the valley floor at lower left"

  - name: "Wheel of Fortune"
    numeral: "X"
    description: "Bold psychedelic poster art, flat saturated color fields with heavy black outlines, Art Nouveau flowing curves — a giant mandala wheel floats in a cosmic sky, four figures at the cardinal points: angel, eagle, bull, and lion. A tie-dye spiral spins at the center of the wheel. Zodiac symbols ring the outer rim in bold graphic forms. Electric purple, acid orange, and cyan dominate, graphic flatness like a Fillmore concert poster."
    key_symbols: [mandala wheel, tie-dye spiral center, angel, eagle, bull, lion, zodiac rim]
    composition: "The great wheel fills the frame centered; the four creatures anchor the corners; the tie-dye spiral draws the eye to the center; zodiac symbols ring the outer edge"

  - name: "Justice"
    numeral: "XI"
    description: "Bold psychedelic poster art, flat saturated color fields with heavy black outlines, Art Nouveau flowing curves — a figure seated on a geometric throne holding balanced scales in one hand and a raised sword in the other, a blindfold pushed up onto the forehead revealing open eyes. Protest banners flank the throne on both sides. Gold, hot pink, and electric purple dominate, graphic flatness like a Fillmore concert poster."
    key_symbols: [geometric throne, balanced scales, raised sword, pushed-up blindfold, protest banners]
    composition: "Central seated figure on the geometric throne; scales extend to the left, sword raised to the right; protest banners hang vertically at both edges framing the scene"

  - name: "The Hanged Man"
    numeral: "XII"
    description: "Bold psychedelic poster art, flat saturated color fields with heavy black outlines, Art Nouveau flowing curves — a figure suspended by one foot from a tree branch hung with colorful prayer flags, arms relaxed and open, a halo of golden light radiating around the head. The figure's expression is serene. The world is inverted but peaceful. Cyan, gold, and chartreuse dominate, graphic flatness like a Fillmore concert poster."
    key_symbols: [suspended figure, prayer flag branch, one-foot hang, golden halo, serene expression]
    composition: "The tree branch extends horizontally across the top; the figure hangs inverted at center; prayer flags drape and flutter from the branch; the halo glows at the bottom-center around the head"

  - name: "Death"
    numeral: "XIII"
    description: "Bold psychedelic poster art, flat saturated color fields with heavy black outlines, Art Nouveau flowing curves — a skeleton rides a pale horse through a field of dying sunflowers, carrying a black flag emblazoned with a white rose. Figures kneel as it passes — a child offers a flower up to the rider. A sunrise blazes on the horizon in bands of gold and hot pink. Bone-white, black, and sunrise gold dominate, graphic flatness like a Fillmore concert poster."
    key_symbols: [skeleton rider, pale horse, dying sunflowers, black flag with white rose, child offering flower, sunrise]
    composition: "The skeleton on horseback rides from left to right across center; dying sunflowers fill the foreground; the child kneels at lower right; the sunrise fills the horizon behind"

  - name: "Temperance"
    numeral: "XIV"
    description: "Bold psychedelic poster art, flat saturated color fields with heavy black outlines, Art Nouveau flowing curves — a winged figure pours liquid between two vessels at the edge of a stream, one foot on land, one in water. Irises and lilies grow lush along the banks. A rainbow arcs through the pour of liquid between the vessels. Cyan, gold, and violet dominate, chartreuse accents, graphic flatness like a Fillmore concert poster."
    key_symbols: [winged figure, two vessels, pouring liquid, rainbow arc, irises, lilies, stream edge]
    composition: "The winged figure stands at center straddling the stream edge; the two vessels and the rainbow pour connect upper left to lower right; irises and lilies frame the base"

  - name: "The Devil"
    numeral: "XV"
    description: "Bold psychedelic poster art, flat saturated color fields with heavy black outlines, Art Nouveau flowing curves — a horned figure perches atop a black cube pedestal, bat wings spread wide. Two figures stand loosely chained below — the chains made of linked dollar bills and TV antennas, loose enough to slip off. The chained figures could free themselves but do not. Black, acid orange, and hot pink dominate, graphic flatness like a Fillmore concert poster."
    key_symbols: [horned figure, black cube, bat wings, chained figures, dollar bill chains, TV antenna chains]
    composition: "The horned figure sits elevated at top center on the cube; the two chained figures stand symmetrically below at left and right; the chains drape loosely between them and the cube"

  - name: "The Tower"
    numeral: "XVI"
    description: "Bold psychedelic poster art, flat saturated color fields with heavy black outlines, Art Nouveau flowing curves — a tall narrow tower struck by a bolt of lightning, two figures falling through the air, a crown blown off the top. Flames shaped like flowers pour from the windows in Art Nouveau curves. The night sky cracks open behind the bolt. Electric purple, acid orange, and gold dominate, graphic flatness like a Fillmore concert poster."
    key_symbols: [narrow tower, lightning bolt, falling figures, blown crown, flower-shaped flames, cracking sky]
    composition: "The tower stands at center, lightning strikes from upper right; the two figures fall symmetrically on either side; flower-flames burst from windows; the crown tumbles at top"

  - name: "The Star"
    numeral: "XVII"
    description: "Bold psychedelic poster art, flat saturated color fields with heavy black outlines, Art Nouveau flowing curves — a nude figure kneels at the edge of a still pool, pouring water from two jugs — one into the pool, one onto the earth. Seven great eight-pointed stars blaze above in the night sky. An ibis stands in the background among night-blooming flowers. Cyan, gold, and deep indigo dominate, graphic flatness like a Fillmore concert poster."
    key_symbols: [kneeling nude figure, two water jugs, still pool, seven eight-pointed stars, ibis, night garden]
    composition: "The kneeling figure is at lower center; water pours in two directions from the jugs; the seven stars arc across the sky above; the ibis stands at right in the garden"

  - name: "The Moon"
    numeral: "XVIII"
    description: "Bold psychedelic poster art, flat saturated color fields with heavy black outlines, Art Nouveau flowing curves — a winding path between two towers leads to distant mountains. A full moon with a face in profile dominates the sky. A wolf and a dog howl on either side of the path. A crayfish emerges from a pool in the foreground. Psychedelic ripples radiate from the moon. Deep indigo, silver, and electric purple dominate, graphic flatness like a Fillmore concert poster."
    key_symbols: [winding path, two towers, full moon with face, wolf, dog, crayfish, psychedelic ripples]
    composition: "The path winds from the foreground pool upward between the two towers to the mountains; the moon fills the sky above; wolf and dog flank the path; the crayfish emerges at bottom center"

  - name: "The Sun"
    numeral: "XIX"
    description: "Bold psychedelic poster art, flat saturated color fields with heavy black outlines, Art Nouveau flowing curves — two children dance joyfully in a walled garden, a huge radiant sun with a smiling face blazing above. Sunflowers line the garden wall. A white horse stands nearby. Butterflies drift through the air. Pure golden light floods every surface. Gold, acid orange, and chartreuse dominate, graphic flatness like a Fillmore concert poster."
    key_symbols: [dancing children, smiling sun face, walled garden, sunflowers, white horse, butterflies]
    composition: "The great sun fills the upper third; the two children dance at center in the garden; sunflowers line the wall behind; the white horse stands at right; butterflies scatter across the scene"

  - name: "Judgement"
    numeral: "XX"
    description: "Bold psychedelic poster art, flat saturated color fields with heavy black outlines, Art Nouveau flowing curves — figures rise from flower-covered graves with arms raised in exaltation. A great angel above blows a trumpet trailing a banner. Clouds part to reveal brilliant golden light pouring down. Mountains frame the background. Gold, electric purple, and hot pink dominate, graphic flatness like a Fillmore concert poster."
    key_symbols: [rising figures, flower-covered graves, great angel, trumpet with banner, parting clouds, golden light]
    composition: "The angel fills the upper center, trumpet pointed downward; figures rise from graves across the lower half; clouds part in a V-shape revealing light; mountains anchor the horizon"

  - name: "The World"
    numeral: "XXI"
    description: "Bold psychedelic poster art, flat saturated color fields with heavy black outlines, Art Nouveau flowing curves — a dancing figure floats inside a great laurel wreath, the four suit symbols anchoring the corners. Flowing scarves create an infinity pattern around the dancer. A globe is visible behind the figure. A cosmic starfield fills the background beyond the wreath. Electric purple, gold, cyan, and hot pink dominate, graphic flatness like a Fillmore concert poster."
    key_symbols: [dancing figure, laurel wreath, four suit symbols, infinity scarves, globe, cosmic starfield]
    composition: "The laurel wreath forms a perfect oval at center; the dancer fills it with flowing movement; the four suit symbols anchor the corners; the starfield extends beyond the wreath to all edges"

minor_arcana:
  wands:
    pips:
      "1":
        description: "Bold psychedelic poster art, flat saturated color fields with heavy black outlines, Art Nouveau flowing curves — a single wand thrust upright from a mountaintop, a hand emerging from a cloud gripping it firmly. Leaves sprout from the living wood. A sunburst radiates behind in concentric rings of gold and acid orange. Chartreuse leaves against electric purple sky, graphic flatness like a Fillmore concert poster."
        key_symbols: [single wand, cloud hand, sprouting leaves, mountaintop, sunburst]
        composition: "The wand stands vertical at center; the cloud hand grips it from upper left; the sunburst radiates from behind the wand; the mountaintop anchors the base"
      "2":
        description: "Bold psychedelic poster art, flat saturated color fields with heavy black outlines, Art Nouveau flowing curves — a figure stands on a castle battlement holding two wands, gazing out over a vast sea. A globe rests in one hand as the figure contemplates two diverging paths below. Gold and cyan dominate, electric purple accents, graphic flatness like a Fillmore concert poster."
        key_symbols: [two wands, castle battlement, sea view, globe, two paths]
        composition: "The figure stands at center on the battlement; one wand in each hand flanking the figure; the sea stretches behind; the two paths diverge below"
      "3":
        description: "Bold psychedelic poster art, flat saturated color fields with heavy black outlines, Art Nouveau flowing curves — a figure stands on a cliff watching three ships sail on the horizon, three wands planted firmly beside them. A golden sky blazes behind the ships. The scene radiates anticipation of a journey beginning. Gold, acid orange, and deep indigo dominate, graphic flatness like a Fillmore concert poster."
        key_symbols: [cliff figure, three ships, three wands, golden horizon, journey]
        composition: "The figure stands at left with the three wands; ships sail across the horizon at center-right; the golden sky fills the upper half"
      "4":
        description: "Bold psychedelic poster art, flat saturated color fields with heavy black outlines, Art Nouveau flowing curves — four wands form a canopy decorated with elaborate flower garlands in hot pink and chartreuse. Two figures celebrate beneath the canopy, dancing. A castle rises in the background. A harvest festival scene of abundance. Gold, hot pink, and chartreuse dominate, graphic flatness like a Fillmore concert poster."
        key_symbols: [four wand canopy, flower garlands, celebrating figures, castle, harvest festival]
        composition: "The four wands stand at the corners forming the canopy frame; garlands drape between them; the two figures dance beneath at center; the castle rises behind"
      "5":
        description: "Bold psychedelic poster art, flat saturated color fields with heavy black outlines, Art Nouveau flowing curves — five figures each wield a wand in a chaotic scuffle across a muddy field, no clear winner emerging. Competitive energy spills in every direction with crossed wands and clashing angles. Acid orange, electric purple, and hot pink dominate, graphic flatness like a Fillmore concert poster."
        key_symbols: [five figures, five wands, chaotic scuffle, muddy field, crossed angles]
        composition: "The five figures fill the frame in a tangled knot at center; wands cross at sharp angles; the muddy field stretches to the edges; energy radiates outward"
      "6":
        description: "Bold psychedelic poster art, flat saturated color fields with heavy black outlines, Art Nouveau flowing curves — a figure on horseback wearing a flower-crown wreath of victory, holding a wand aloft triumphantly. Five more wands are carried by an adoring crowd following behind in a parade procession. Gold, chartreuse, and hot pink dominate, graphic flatness like a Fillmore concert poster."
        key_symbols: [mounted victor, flower crown, raised wand, crowd with five wands, parade]
        composition: "The mounted figure rides at center-left, elevated above the crowd; the five wand-bearers follow behind to the right; the flower crown is the highest point"
      "7":
        description: "Bold psychedelic poster art, flat saturated color fields with heavy black outlines, Art Nouveau flowing curves — a figure stands on a hilltop defending with a single wand against six wands rising from below. The stance is determined and defiant, holding the advantage of high ground. Electric purple and acid orange dominate, gold accents, graphic flatness like a Fillmore concert poster."
        key_symbols: [hilltop defender, single wand, six rising wands, high ground, determined stance]
        composition: "The defender stands at top center on the hilltop; six wands angle upward from the lower half; the hilltop divides the composition horizontally"
      "8":
        description: "Bold psychedelic poster art, flat saturated color fields with heavy black outlines, Art Nouveau flowing curves — eight wands fly diagonally through a clear sky over an open landscape, speed lines trailing behind each one. A river winds through the landscape below. Everything is in rapid motion. Cyan, gold, and acid orange dominate, graphic flatness like a Fillmore concert poster."
        key_symbols: [eight flying wands, diagonal motion, speed lines, open landscape, river]
        composition: "The eight wands arc diagonally from upper left to lower right in parallel; the landscape stretches below; the river winds through the lower third"
      "9":
        description: "Bold psychedelic poster art, flat saturated color fields with heavy black outlines, Art Nouveau flowing curves — a bandaged figure leans wearily on a wand behind a fence of eight more wands, watchful and guarded. The figure is bruised but standing firm under a night sky. Deep indigo and electric purple dominate, gold and hot pink accents, graphic flatness like a Fillmore concert poster."
        key_symbols: [bandaged figure, leaning wand, eight wand fence, weariness, night sky]
        composition: "The eight wands form a vertical fence across the foreground; the bandaged figure stands just behind at center, leaning on the ninth wand; the night sky fills the background"
      "10":
        description: "Bold psychedelic poster art, flat saturated color fields with heavy black outlines, Art Nouveau flowing curves — a figure bent under the weight of ten bundled wands, walking with effort toward a distant town on the horizon. The burden is enormous but the destination is close. Acid orange and deep indigo dominate, gold accents, graphic flatness like a Fillmore concert poster."
        key_symbols: [bent figure, ten bundled wands, heavy burden, distant town, trudging]
        composition: "The bent figure moves from right toward the town at left; the bundle of ten wands creates a massive diagonal shape on the figure's back; the town glows on the horizon"
    court:
      Page:
        description: "Bold psychedelic poster art, flat saturated color fields with heavy black outlines, Art Nouveau flowing curves — a young figure holds a wand before them like a proclamation, gazing at the sprouting leaves with wonder and curiosity. The figure stands in a sunlit desert landscape with distant mesas. Acid orange, chartreuse, and gold dominate, graphic flatness like a Fillmore concert poster."
        key_symbols: [young figure, sprouting wand, wonder, desert landscape, mesas]
        composition: "The figure stands at center holding the wand vertically before them; sprouting leaves are the focal point; mesa landscape stretches behind"
      Knight:
        description: "Bold psychedelic poster art, flat saturated color fields with heavy black outlines, Art Nouveau flowing curves — a figure on a rearing horse charges forward brandishing a wand, cloak streaming behind in Art Nouveau curves. The horse's mane flows like flames. A desert landscape blurs with speed. Acid orange, hot pink, and gold dominate, graphic flatness like a Fillmore concert poster."
        key_symbols: [rearing horse, charging knight, brandished wand, streaming cloak, flame mane]
        composition: "Horse and rider fill the frame from left to right in mid-charge; the streaming cloak and mane create flowing curves behind; the desert landscape is a blur of color below"
      Queen:
        description: "Bold psychedelic poster art, flat saturated color fields with heavy black outlines, Art Nouveau flowing curves — a confident woman sits on a throne decorated with sunflowers and lions, holding a wand in one hand and a single sunflower in the other. A black cat sits at her feet. Sunflower fields stretch behind. Gold, acid orange, and chartreuse dominate, graphic flatness like a Fillmore concert poster."
        key_symbols: [enthroned queen, sunflower throne, wand, sunflower, black cat, sunflower fields]
        composition: "The queen sits centered on her throne; the wand rises vertically at left, the sunflower at right; the black cat anchors the base; sunflower fields fill the background"
      King:
        description: "Bold psychedelic poster art, flat saturated color fields with heavy black outlines, Art Nouveau flowing curves — a commanding figure sits on a throne carved with salamanders and flames, holding a flowering wand. A small salamander perches on the throne arm. The robes are patterned with bold geometric fire motifs. Acid orange, electric purple, and gold dominate, graphic flatness like a Fillmore concert poster."
        key_symbols: [enthroned king, salamander throne, flowering wand, fire-patterned robes, salamander]
        composition: "The king fills the frame seated at center; the flowering wand is held upright at right; salamanders carved into the throne curve along both sides"

  cups:
    pips:
      "1":
        description: "Bold psychedelic poster art, flat saturated color fields with heavy black outlines, Art Nouveau flowing curves — a great chalice overflowing with water, held aloft by a hand emerging from a cloud. A dove descends into the cup. Lotus flowers float on the overflow. Five streams pour downward in Art Nouveau curves. Cyan, gold, and electric purple dominate, graphic flatness like a Fillmore concert poster."
        key_symbols: [great chalice, cloud hand, descending dove, lotus flowers, five streams]
        composition: "The chalice is centered in the upper half; the cloud hand grips it from above; the dove descends into it; five streams cascade downward filling the lower half; lotus flowers float at the base"
      "2":
        description: "Bold psychedelic poster art, flat saturated color fields with heavy black outlines, Art Nouveau flowing curves — two figures exchange cups beneath a winged lion's head that floats between them. A caduceus rises between the cups. A cottage garden blooms behind in lush Art Nouveau tendrils. Hot pink, gold, and chartreuse dominate, graphic flatness like a Fillmore concert poster."
        key_symbols: [two figures, exchanged cups, winged lion head, caduceus, cottage garden]
        composition: "The two figures face each other symmetrically at left and right; the winged lion head floats above center; the caduceus rises between the cups; the garden fills the background"
      "3":
        description: "Bold psychedelic poster art, flat saturated color fields with heavy black outlines, Art Nouveau flowing curves — three women raise cups in a joyful toast in a garden, flower garlands hanging overhead in sweeping curves. Grapes and harvest abundance cover the table before them. Celebration and camaraderie. Gold, hot pink, and chartreuse dominate, graphic flatness like a Fillmore concert poster."
        key_symbols: [three women, raised cups, toast, flower garlands, grapes, harvest table]
        composition: "The three women stand in a row at center, cups raised high; garlands drape in curves above; the laden table fills the foreground"
      "4":
        description: "Bold psychedelic poster art, flat saturated color fields with heavy black outlines, Art Nouveau flowing curves — a figure sits under a tree with arms crossed, ignoring three cups set before them on the ground. A fourth cup is offered by a mysterious hand extending from a cloud above. Dissatisfaction despite abundance. Electric purple, indigo, and muted gold dominate, graphic flatness like a Fillmore concert poster."
        key_symbols: [seated figure, crossed arms, three ignored cups, cloud hand, offered fourth cup, tree]
        composition: "The figure sits at center beneath the tree; three cups are arranged on the ground before them; the cloud hand extends the fourth cup from upper right"
      "5":
        description: "Bold psychedelic poster art, flat saturated color fields with heavy black outlines, Art Nouveau flowing curves — a cloaked figure stands staring down at three spilled cups, liquid pooling around them. Two cups still stand upright behind the figure. A bridge leads to a distant house across a flowing river. Deep indigo, electric purple, and cyan dominate, graphic flatness like a Fillmore concert poster."
        key_symbols: [cloaked figure, three spilled cups, two standing cups, bridge, distant house, river]
        composition: "The cloaked figure stands at center looking down; the three spilled cups are in the foreground; the two standing cups are behind at left; the bridge and house recede to the right"
      "6":
        description: "Bold psychedelic poster art, flat saturated color fields with heavy black outlines, Art Nouveau flowing curves — a boy offers a cup filled with flowers to a girl in a cottage garden, six cups arranged in a neat row between them. The scene radiates nostalgia and innocence, a memory rendered in soft psychedelic pastels. Hot pink, chartreuse, and gold dominate, graphic flatness like a Fillmore concert poster."
        key_symbols: [boy offering cup, girl receiving, flower-filled cup, cottage garden, six cups in a row, nostalgia]
        composition: "The two children face each other at center; the six cups line up between them in a row; the cottage garden blooms behind and around them"
      "7":
        description: "Bold psychedelic poster art, flat saturated color fields with heavy black outlines, Art Nouveau flowing curves — seven cups float in psychedelic clouds, each containing a different vision: a castle, jewels, a victory wreath, a dragon, a serpent, a glowing figure, and a veiled mystery. Each cup is a window to fantasy. Electric purple, cyan, acid orange, and gold dominate, graphic flatness like a Fillmore concert poster."
        key_symbols: [seven floating cups, castle vision, jewels, wreath, dragon, serpent, glowing figure, veiled mystery]
        composition: "The seven cups are arranged in a cloud formation filling the frame; a silhouetted figure gazes up at them from below center; each cup glows with its own vision"
      "8":
        description: "Bold psychedelic poster art, flat saturated color fields with heavy black outlines, Art Nouveau flowing curves — a figure walks away from eight stacked cups toward a mountain pass under a crescent moon, leaving behind what is known. A gap in the row of cups marks the departure. Deep indigo, electric purple, and silver dominate, graphic flatness like a Fillmore concert poster."
        key_symbols: [departing figure, eight stacked cups, mountain pass, crescent moon, gap in cups]
        composition: "The eight cups are stacked at right; the figure walks away toward the left where the mountain pass opens; the crescent moon hangs above the pass"
      "9":
        description: "Bold psychedelic poster art, flat saturated color fields with heavy black outlines, Art Nouveau flowing curves — a satisfied figure sits on a wooden bench, arms crossed contentedly. Nine cups are arranged in a proud arc on a shelf behind the figure. The wish is fulfilled. Gold, acid orange, and chartreuse dominate, graphic flatness like a Fillmore concert poster."
        key_symbols: [satisfied figure, wooden bench, crossed arms, nine cups on shelf, contentment]
