        composition: "The pierced heart fills the center of the frame; three swords enter from different angles; rain falls diagonally across the background; storm clouds mass behind"
      "4":
        description: "Bold psychedelic poster art, flat saturated color fields with heavy black outlines, Art Nouveau flowing curves — a figure lies on a stone slab in a chapel, hands folded in rest. Three swords hang on the wall above, one lies beneath the slab. A stained glass window casts colored light across the scene. Enforced rest and contemplation. Deep indigo, gold, and electric purple dominate, graphic flatness like a Fillmore concert poster."
