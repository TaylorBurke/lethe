      "8":
        description: "Bold psychedelic poster art, flat saturated color fields with heavy black outlines, Art Nouveau flowing curves — a bound and blindfolded figure stands surrounded by eight swords driven into the ground in a tight circle. Water pools at the figure's feet. A castle sits on a distant hill. Feeling trapped but the bonds are not absolute. Deep indigo, silver, and electric purple dominate, graphic flatness like a Fillmore concert poster."
